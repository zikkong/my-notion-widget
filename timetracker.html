<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <style>
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff');
      font-weight: 300;
    }
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff');
      font-weight: 700;
    }

    :root {
      --bg:        #ffffff;
      --border:    #615847;
      --txt:       #615847;
      --txt-mute:  #a08c78;
      --radius:    18px;
      --cell-h:    44px;
      --label-w:   48px;
      --font-body: 'SBAggroOTF', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--txt);
      height: 100vh;
      display: flex;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      pointer-events: none;
      z-index: 9999;
    }

    .widget-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── 헤더 ── */
    .header-wrap {
      flex-shrink: 0;
      padding: 16px 16px 0;
      background: var(--bg);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2px 12px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 10px;
    }
    .header-title { font-size: 22px; font-weight: 700; color: var(--txt); letter-spacing: -0.5px; }
    .header-date  { font-size: 11px; font-weight: 300; color: var(--txt-mute); margin-top: 3px; }
    .header-actions { display: flex; gap: 6px; align-items: center; }

    .icon-btn {
      background: #FEEAF1;
      border: 1px solid #e8ddd5;
      border-radius: 8px;
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: var(--txt);
    }
    .icon-btn:active { transform: scale(0.9); }

    .add-btn {
      background: var(--border);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
    }

    /* ── 스크롤 영역 ── */
    .timeline-outer {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
    }

    /* ── 그리드 ── */
    .timeline-wrap { display: flex; }

    .time-labels {
      width: var(--label-w);
      flex-shrink: 0;
    }

    /* 레이블은 1시간마다 = 2칸 높이 */
    .time-label {
      height: calc(var(--cell-h) * 2);
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-right: 8px;
      padding-top: 3px;
      font-size: 11px;
      font-weight: 400;
      color: var(--txt);
    }

    .grid-area {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    /* 1시간 = 2행 (각 30분) */
    .hour-block { display: flex; flex-direction: column; }
    .hour-block:last-child .half-row:last-child { border-bottom: none; }

    .half-row {
      height: var(--cell-h);
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #f0e8e0;
      position: relative;
    }
    .half-row.first-half { border-bottom: 1px dashed #e8ddd5; }
    .half-row.second-half { border-bottom: 1px solid #e0d4cc; }

    /* 30분 셀 */
    .slot-cell {
      position: relative;
      border-right: 1px solid #f0e8e0;
      cursor: crosshair;
      transition: background .1s;
    }
    .slot-cell:last-child { border-right: none; }
    .slot-cell:hover { background: rgba(97,88,71,0.04); }

    .slot-label {
      position: absolute;
      top: 3px; left: 4px;
      font-size: 9px;
      font-weight: 300;
      color: var(--txt-mute);
      pointer-events: none;
      user-select: none;
    }

    /* 현재 시간 선 */
    .now-marker {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: #FDD5E7;
      z-index: 20;
      pointer-events: none;
    }
    .now-marker::before {
      content: '';
      position: absolute;
      right: -4px; top: -4px;
      width: 10px; height: 10px;
      background: #FDD5E7;
      border-radius: 50%;
    }

    /* 이벤트 블록 - 셀 위에 absolute로 올라감 */
    .event-block {
      position: absolute;
      top: 2px; bottom: 2px;
      left: 2px; right: 2px;
      border-radius: 6px;
      padding: 2px 6px;
      z-index: 10;
      cursor: pointer;
      overflow: hidden;
      user-select: none;
    }
    .event-block:hover .event-delete { display: flex; }

    .event-title {
      font-size: 11px;
      font-weight: 400;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: var(--cell-h);
    }

    .event-delete {
      position: absolute;
      top: 2px; right: 3px;
      width: 14px; height: 14px;
      background: rgba(255,255,255,0.35);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 8px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* 드래그 선택 하이라이트 */
    .slot-cell.selecting { background: rgba(97,88,71,0.12) !important; outline: 2px dashed var(--border); outline-offset: -2px; }
    .slot-cell.selected-event { }

    /* ── 모달 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.2);
      z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 20px; width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .modal-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 14px; }
    .modal-time-info { font-size: 12px; font-weight: 300; color: var(--txt-mute); margin-bottom: 12px; }

    .modal input[type="text"] {
      width: 100%; border: 1.5px solid #e8ddd5; border-radius: 8px;
      padding: 8px 10px; font-size: 13px; font-family: var(--font-body);
      color: var(--txt); margin-bottom: 12px; outline: none;
    }
    .modal input[type="text"]:focus { border-color: var(--border); }

    .color-label { font-size: 11px; font-weight: 300; color: var(--txt-mute); margin-bottom: 8px; }
    .color-palette { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .color-dot {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent; transition: transform .15s;
    }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.selected { border-color: var(--border); transform: scale(1.15); }

    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button {
      border: none; border-radius: 8px; padding: 7px 14px;
      font-size: 12px; font-family: var(--font-body); cursor: pointer;
    }
    .btn-cancel { background: #f0e8e0; color: var(--txt); }
    .btn-save   { background: var(--border); color: #fff; font-weight: 400; }

    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--border); color: #fff;
      padding: 8px 16px; border-radius: 20px;
      font-size: 12px; font-weight: 300;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none; z-index: 9998;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="widget-container">

  <div class="header-wrap">
    <div class="header">
      <div>
        <div class="header-title" id="header-date">—</div>
        <div class="header-date"  id="header-sub">—</div>
      </div>
      <div class="header-actions">
        <div class="icon-btn" onclick="clearAll()" title="전체 삭제">🗑</div>
        <button class="add-btn" onclick="openModal(null)">+ 추가</button>
      </div>
    </div>
  </div>

  <div class="timeline-outer" id="timeline-outer">
    <div class="timeline-wrap">
      <div class="time-labels" id="time-labels"></div>
      <div class="grid-area"   id="grid-area"></div>
    </div>
  </div>

</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">일정 추가</div>
    <div class="modal-time-info" id="modal-time-info"></div>
    <input type="text" id="modal-input" placeholder="업무 내용을 입력하세요" />
    <div class="color-label">색상 선택</div>
    <div class="color-palette" id="color-palette"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save"   onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const START_HOUR = 8;
  const END_HOUR   = 24;
  const CELL_H     = 44; // px (30분 셀 높이, CSS --cell-h 와 동일)

  const COLORS = [
    '#c4a882','#f0a0b8','#82c882','#74aee8',
    '#c49ad6','#f0a070','#e8c96a','#f08080',
    '#D3EBAD','#FDD5E7','#a08c78','#748ffc'
  ];

  // events: [{ start: 'HH:MM', end: 'HH:MM', title, color }]
  let events = JSON.parse(localStorage.getItem('timetracker-v2') || '[]');
  let selectedColor = COLORS[0];

  // 드래그 상태
  let dragStart = null; // { slotKey }
  let dragCurrent = null;
  let isDragging = false;

  // 날짜
  const today = new Date();
  const DAYS  = ['일','월','화','수','목','금','토'];
  document.getElementById('header-date').textContent =
    `${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;
  document.getElementById('header-sub').textContent =
    `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${DAYS[today.getDay()]})`;

  // ── 슬롯 키 유틸 ─────────────────────────────────────────
  // slotKey: "HH:MM" (30분 단위)
  function makeSlots() {
    const slots = [];
    for (let h = START_HOUR; h < END_HOUR; h++) {
      slots.push(`${String(h).padStart(2,'0')}:00`);
      slots.push(`${String(h).padStart(2,'0')}:30`);
    }
    return slots;
  }
  const ALL_SLOTS = makeSlots();

  function slotIndex(key) { return ALL_SLOTS.indexOf(key); }

  function nextSlot(key) {
    const idx = slotIndex(key);
    if (idx < 0 || idx >= ALL_SLOTS.length - 1) {
      // 마지막 슬롯의 끝 = END_HOUR:00
      return `${String(END_HOUR).padStart(2,'0')}:00`;
    }
    return ALL_SLOTS[idx + 1];
  }

  // ── 그리드 생성 ───────────────────────────────────────────
  function buildGrid() {
    const labels = document.getElementById('time-labels');
    const grid   = document.getElementById('grid-area');
    labels.innerHTML = '';
    grid.innerHTML   = '';

    for (let h = START_HOUR; h < END_HOUR; h++) {
      // 레이블 (1시간 = 2셀 높이)
      const lbl = document.createElement('div');
      lbl.className = 'time-label';
      lbl.textContent = `${h}:00`;
      labels.appendChild(lbl);

      // 1시간 블록
      const hBlock = document.createElement('div');
      hBlock.className = 'hour-block';
      hBlock.dataset.hour = h;

      // :00 행
      const row1 = document.createElement('div');
      row1.className = 'half-row first-half';
      // :30 행
      const row2 = document.createElement('div');
      row2.className = 'half-row second-half';

      // 각 행에 2개 셀 (:00 왼/오, :30 왼/오 → 사실 각 행은 하나의 30분 슬롯)
      // 여기선 1행 = 30분 = 1슬롯으로 처리
      // 왼쪽/오른쪽은 같은 슬롯이므로 셀 자체가 슬롯
      const cell1 = makeCellFull(`${String(h).padStart(2,'0')}:00`);
      const cell2 = makeCellFull(`${String(h).padStart(2,'0')}:30`);

      row1.appendChild(cell1);
      row2.appendChild(cell2);
      hBlock.appendChild(row1);
      hBlock.appendChild(row2);
      grid.appendChild(hBlock);
    }

    // 현재 시간 선
    updateNowLine();
    renderEvents();
  }

  function makeCellFull(slotKey) {
    const cell = document.createElement('div');
    cell.className = 'slot-cell';
    cell.dataset.slot = slotKey;
    cell.style.gridColumn = '1 / -1'; // 전체 너비

    const lbl = document.createElement('span');
    lbl.className = 'slot-label';
    lbl.textContent = slotKey;
    cell.appendChild(lbl);

    // 마우스 이벤트
    cell.addEventListener('mousedown', onCellMousedown);
    cell.addEventListener('mouseenter', onCellMouseenter);

    return cell;
  }

  // ── 드래그 선택 ───────────────────────────────────────────
  function onCellMousedown(e) {
    if (e.button !== 0) return;
    e.preventDefault();
    dragStart   = this.dataset.slot;
    dragCurrent = this.dataset.slot;
    isDragging  = true;
    highlightRange(dragStart, dragCurrent);
  }

  function onCellMouseenter() {
    if (!isDragging) return;
    dragCurrent = this.dataset.slot;
    highlightRange(dragStart, dragCurrent);
  }

  document.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    const s = slotIndex(dragStart) <= slotIndex(dragCurrent) ? dragStart : dragCurrent;
    const eKey = slotIndex(dragStart) <= slotIndex(dragCurrent) ? dragCurrent : dragStart;
    clearHighlight();
    openModal({ start: s, end: nextSlot(eKey) });
    dragStart = dragCurrent = null;
  });

  function highlightRange(a, b) {
    clearHighlight();
    const ia = slotIndex(a), ib = slotIndex(b);
    const lo = Math.min(ia, ib), hi = Math.max(ia, ib);
    document.querySelectorAll('.slot-cell').forEach(c => {
      const idx = slotIndex(c.dataset.slot);
      if (idx >= lo && idx <= hi) c.classList.add('selecting');
    });
  }

  function clearHighlight() {
    document.querySelectorAll('.slot-cell.selecting').forEach(c => c.classList.remove('selecting'));
  }

  // ── 현재 시간 선 ──────────────────────────────────────────
  function updateNowLine() {
    const grid = document.getElementById('grid-area');
    document.querySelectorAll('.now-marker').forEach(el => el.remove());

    const now  = new Date();
    const mins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
    if (mins < 0 || mins > (END_HOUR - START_HOUR) * 60) return;

    const topPx = (mins / 30) * CELL_H;
    const marker = document.createElement('div');
    marker.className = 'now-marker';
    marker.style.top = topPx + 'px';
    marker.style.position = 'absolute';
    marker.style.left = '0'; marker.style.right = '0';
    grid.style.position = 'relative';
    grid.appendChild(marker);
  }
  setInterval(updateNowLine, 60000);

  // ── 이벤트 렌더링 ─────────────────────────────────────────
  function renderEvents() {
    document.querySelectorAll('.event-block').forEach(el => el.remove());
    const grid = document.getElementById('grid-area');

    events.forEach((ev, idx) => {
      const startIdx = slotIndex(ev.start);
      const endIdx   = slotIndex(ev.end) - 1; // end는 exclusive
      if (startIdx < 0) return;

      const spanCount = Math.max(1, slotIndex(ev.end) - startIdx);
      const topPx  = startIdx * CELL_H;
      const height = spanCount * CELL_H - 4;

      const block = document.createElement('div');
      block.className = 'event-block';
      block.style.cssText = `
        top: ${topPx + 2}px;
        height: ${height}px;
        left: 2px; right: 2px;
        background: ${ev.color};
        position: absolute;
      `;

      block.innerHTML = `
        <button class="event-delete" onclick="deleteEvent(${idx})">✕</button>
        <div class="event-title">${escHtml(ev.title || '(제목 없음)')}</div>`;

      block.addEventListener('dblclick', () => editEvent(idx));

      grid.appendChild(block);
    });
  }

  // ── 모달 ──────────────────────────────────────────────────
  function openModal(range) {
    // 색상 팔레트
    const palette = document.getElementById('color-palette');
    palette.innerHTML = '';
    COLORS.forEach(c => {
      const dot = document.createElement('div');
      dot.className = 'color-dot' + (c === selectedColor ? ' selected' : '');
      dot.style.background = c;
      dot.addEventListener('click', () => {
        selectedColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
      });
      palette.appendChild(dot);
    });

    document.getElementById('modal-input').value = '';
    const overlay = document.getElementById('modal-overlay');

    if (range) {
      document.getElementById('modal-time-info').textContent = `${range.start} ~ ${range.end}`;
      overlay.dataset.start = range.start;
      overlay.dataset.end   = range.end;
    } else {
      document.getElementById('modal-time-info').textContent = '시간을 드래그해서 선택하세요';
      delete overlay.dataset.start;
      delete overlay.dataset.end;
    }
    delete overlay.dataset.editIdx;

    overlay.classList.add('open');
    setTimeout(() => document.getElementById('modal-input').focus(), 50);
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

  function saveEvent() {
    const overlay = document.getElementById('modal-overlay');
    const title   = document.getElementById('modal-input').value.trim();
    const start   = overlay.dataset.start;
    const end     = overlay.dataset.end;

    if (!start || !end) { showToast('시간을 드래그해서 선택해주세요!'); return; }

    const editIdx = overlay.dataset.editIdx;
    if (editIdx !== undefined) {
      events[parseInt(editIdx)] = { title, start, end, color: selectedColor };
    } else {
      events.push({ title, start, end, color: selectedColor });
    }

    saveEvents();
    closeModal();
    showToast(title ? `"${title}" 추가됨!` : '일정 추가됨!');
  }

  function editEvent(idx) {
    const ev = events[idx];
    selectedColor = ev.color;
    openModal({ start: ev.start, end: ev.end });
    document.getElementById('modal-input').value = ev.title || '';
    document.getElementById('modal-overlay').dataset.editIdx = idx;
  }

  function deleteEvent(idx) {
    events.splice(idx, 1);
    saveEvents();
    showToast('삭제됐어요!');
  }

  function clearAll() {
    if (!confirm('모든 일정을 삭제할까요?')) return;
    events = []; saveEvents(); showToast('전체 삭제됐어요!');
  }

  function saveEvents() {
    localStorage.setItem('timetracker-v2', JSON.stringify(events));
    renderEvents();
  }

  // ── 유틸 ──────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('modal-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveEvent();
    if (e.key === 'Escape') closeModal();
  });

  // ── 초기화 ──────────────────────────────────────────────
  buildGrid();

  // 현재 시간으로 스크롤
  setTimeout(() => {
    const now  = new Date();
    const mins = (now.getHours() - START_HOUR) * 60 + now.getMinutes();
    if (mins > 0) {
      const outer = document.getElementById('timeline-outer');
      outer.scrollTop = Math.max(0, (mins / 30) * CELL_H - 100);
    }
  }, 100);
</script>
</body>
</html>
