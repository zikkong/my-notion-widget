<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Tracker</title>
  <style>
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff'); font-weight:300; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff'); font-weight:400; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff'); font-weight:700; }

    :root {
      --bg:#fff; --border:#615847; --txt:#615847; --txt-mute:#a08c78;
      --radius:18px; --row-h:52px; --label-w:48px;
      --font:'SBAggroOTF',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{display:none;}
    *{-ms-overflow-style:none;scrollbar-width:none;}

    body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;justify-content:center;}
    body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;border:2px solid var(--border);border-radius:var(--radius);pointer-events:none;z-index:9999;}

    .widget{width:100%;}

    /* 헤더 */
    .header-wrap{position:sticky;top:0;z-index:50;padding:16px 16px 0;background:var(--bg);}
    .header{display:flex;justify-content:space-between;align-items:center;padding:0 2px 12px;border-bottom:2px solid var(--border);margin-bottom:10px;}
    .hd-title{font-size:22px;font-weight:700;letter-spacing:-0.5px;}
    .hd-date{font-size:11px;font-weight:300;color:var(--txt-mute);margin-top:3px;}
    .hd-actions{display:flex;gap:6px;align-items:center;}
    .icon-btn{background:#FEEAF1;border:1px solid #e8ddd5;border-radius:8px;width:28px;height:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt);}
    .icon-btn:active{transform:scale(0.9);}
    .add-btn{background:var(--border);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-family:var(--font);cursor:pointer;}

    /* 스크롤 영역 */
    .scroll{padding:0 16px 40px;}
    .tl-wrap{display:flex;}

    /* 시간 레이블 */
    .tl-labels{width:var(--label-w);flex-shrink:0;}
    .tl-label{height:52px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:11px;font-weight:400;color:var(--txt);}

    /* 그리드 */
    .grid{flex:1;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;position:relative;background:#fff;}

    /* 1시간 행 */
    .hour-row{height:52px;display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #e8ddd5;position:relative;}
    .hour-row:last-child{border-bottom:none;}

    /* 30분 셀 */
    .slot{position:relative;cursor:crosshair;}
    .slot:first-child{border-right:1px dashed #e0d4c8;}
    .slot:hover{background:rgba(97,88,71,0.05);}
    .slot-lbl{position:absolute;top:4px;left:5px;font-size:9px;font-weight:300;color:var(--txt-mute);pointer-events:none;user-select:none;}
    .slot.selecting{background:rgba(97,88,71,0.12)!important;outline:2px dashed var(--border);outline-offset:-2px;z-index:5;}

    /* 현재 시간 선 */
    .now-line{position:absolute;left:0;right:0;height:2px;background:#FDD5E7;z-index:20;pointer-events:none;}
    .now-line::before{content:'';position:absolute;right:-4px;top:-4px;width:10px;height:10px;background:#FDD5E7;border-radius:50%;}

    /* 이벤트 블록 */
    .ev-block{position:absolute;border-radius:6px;padding:3px 7px;z-index:10;overflow:hidden;cursor:pointer;user-select:none;}
    .ev-title{font-size:11px;font-weight:400;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
    .ev-time{font-size:9px;font-weight:300;color:rgba(255,255,255,0.8);}
    .ev-del{position:absolute;top:3px;right:4px;width:14px;height:14px;background:rgba(255,255,255,0.3);border:none;border-radius:50%;color:#fff;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;}
    .ev-block:hover .ev-del{display:flex;}

    /* 모달 */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:200;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border:2px solid var(--border);border-radius:var(--radius);padding:20px;width:270px;box-shadow:0 8px 24px rgba(0,0,0,0.12);}
    .modal-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:6px;}
    .modal-range{font-size:12px;font-weight:300;color:var(--txt-mute);margin-bottom:12px;}
    .time-row{display:flex;gap:6px;align-items:center;margin-bottom:12px;}
    .time-row select{flex:1;border:1.5px solid #e8ddd5;border-radius:8px;padding:6px 8px;font-size:12px;font-family:var(--font);color:var(--txt);background:#fff;outline:none;cursor:pointer;}
    .time-row span{font-size:12px;font-weight:300;color:var(--txt-mute);flex-shrink:0;}
    .modal input{width:100%;border:1.5px solid #e8ddd5;border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--font);color:var(--txt);margin-bottom:12px;outline:none;}
    .modal input:focus{border-color:var(--border);}
    .color-lbl{font-size:11px;font-weight:300;color:var(--txt-mute);margin-bottom:8px;}
    .palette{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
    .cdot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s;}
    .cdot:hover{transform:scale(1.15);}
    .cdot.selected{border-color:var(--border);transform:scale(1.15);}
    .modal-btns{display:flex;gap:8px;justify-content:flex-end;}
    .modal-btns button{border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-family:var(--font);cursor:pointer;}
    .btn-cancel{background:#f0e8e0;color:var(--txt);}
    .btn-save{background:var(--border);color:#fff;font-weight:400;}

    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--border);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:300;transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);pointer-events:none;z-index:9998;}
    #toast.show{transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>
<div class="widget">
  <div class="header-wrap">
    <div class="header">
      <div>
        <div class="hd-title" id="hd">—</div>
        <div class="hd-date"  id="hs">—</div>
      </div>
      <div class="hd-actions">
        <div class="icon-btn" onclick="clearAll()">🗑</div>
        <button class="add-btn" onclick="openManual()">+ 추가</button>
      </div>
    </div>
  </div>
  <div class="scroll" id="scroll">
    <div class="tl-wrap">
      <div class="tl-labels" id="labels"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">일정 추가</div>
    <div class="modal-range" id="mrange"></div>
    <div class="time-row" id="mtime" style="display:none">
      <select id="mstart"></select>
      <span>~</span>
      <select id="mend"></select>
    </div>
    <input type="text" id="minput" placeholder="업무 내용을 입력하세요" />
    <div class="color-lbl">색상 선택</div>
    <div class="palette" id="palette"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save"   onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
  const S=8, E=24, ROW_H=52;
  const COLORS=['#c4a882','#f0a0b8','#82c882','#74aee8','#c49ad6','#f0a070','#e8c96a','#f08080','#D3EBAD','#FDD5E7','#a08c78','#748ffc'];
  const SLOTS=[];
  function pad(n){return String(n).padStart(2,'0');}
  for(let h=S;h<E;h++){SLOTS.push(pad(h)+':00');SLOTS.push(pad(h)+':30');}
  function si(k){return SLOTS.indexOf(k);}
  function nextSlot(k){const i=si(k);return i<0||i>=SLOTS.length-1?pad(E)+':00':SLOTS[i+1];}

  let evs=JSON.parse(localStorage.getItem('tt-v3')||'[]');
  let color=COLORS[0], dragA=null, dragB=null, dragging=false;

  // 날짜
  const today=new Date(), DAYS=['일','월','화','수','목','금','토'];
  document.getElementById('hd').textContent=pad(today.getMonth()+1)+'.'+pad(today.getDate());
  document.getElementById('hs').textContent=today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일 ('+DAYS[today.getDay()]+')';

  // 그리드 생성
  function buildGrid(){
    const labels=document.getElementById('labels');
    const grid=document.getElementById('grid');
    labels.innerHTML=grid.innerHTML='';
    for(let h=S;h<E;h++){
      const lbl=document.createElement('div');
      lbl.className='tl-label'; lbl.textContent=h+':00';
      labels.appendChild(lbl);
      const row=document.createElement('div');
      row.className='hour-row';
      [pad(h)+':00', pad(h)+':30'].forEach(slot=>{
        const cell=document.createElement('div');
        cell.className='slot'; cell.dataset.slot=slot;
        const l=document.createElement('span');
        l.className='slot-lbl'; l.textContent=slot;
        cell.appendChild(l);
        cell.addEventListener('mousedown',e=>{
          if(e.button!==0)return; e.preventDefault();
          dragging=true; dragA=dragB=slot; highlight();
        });
        cell.addEventListener('mouseenter',()=>{
          if(!dragging)return; dragB=slot; highlight();
        });
        row.appendChild(cell);
      });
      grid.appendChild(row);
    }
    updateNow(); renderEvs();
  }

  function highlight(){
    document.querySelectorAll('.slot.selecting').forEach(c=>c.classList.remove('selecting'));
    if(!dragA||!dragB)return;
    const lo=Math.min(si(dragA),si(dragB)), hi=Math.max(si(dragA),si(dragB));
    document.querySelectorAll('.slot').forEach(c=>{
      const i=si(c.dataset.slot);
      if(i>=lo&&i<=hi)c.classList.add('selecting');
    });
  }

  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    document.querySelectorAll('.slot.selecting').forEach(c=>c.classList.remove('selecting'));
    if(!dragA||!dragB)return;
    const lo=SLOTS[Math.min(si(dragA),si(dragB))];
    const hi=SLOTS[Math.max(si(dragA),si(dragB))];
    openModal(lo, nextSlot(hi));
    dragA=dragB=null;
  });

  // 현재 시간 선
  function updateNow(){
    const grid=document.getElementById('grid');
    document.querySelectorAll('.now-line').forEach(e=>e.remove());
    const now=new Date();
    const mins=(now.getHours()-S)*60+now.getMinutes();
    if(mins<0||mins>(E-S)*60)return;
    const line=document.createElement('div');
    line.className='now-line';
    line.style.top=(mins/60*ROW_H)+'px';
    grid.appendChild(line);
  }
  setInterval(updateNow,60000);

  // 이벤트 렌더링
  function renderEvs(){
    const grid=document.getElementById('grid');
    document.querySelectorAll('.ev-block').forEach(e=>e.remove());
    evs.forEach((ev,idx)=>{
      const sIdx=si(ev.start), eIdx=si(ev.end);
      if(sIdx<0)return;
      const span=eIdx>0?eIdx-sIdx:1;
      const rowIdx=Math.floor(sIdx/2);
      const isLeft=sIdx%2===0;
      const topPx=rowIdx*ROW_H;

      let height, left, right;
      if(span===1){
        // 30분: 행 전체 높이, 가로 절반
        height=ROW_H;
        if(isLeft){left='1px';right='calc(50% + 1px)';}
        else{left='calc(50% + 1px)';right='1px';}
      } else if(span===2&&isLeft){
        // 정확히 1시간(:00~:00): 행 전체
        height=ROW_H;
        left='1px'; right='1px';
      } else {
        // 그 이상: 여러 행
        const endRowIdx=Math.ceil((sIdx+span)/2);
        height=(endRowIdx-rowIdx)*ROW_H;
        if(isLeft){left='1px';right='1px';}
        else{left='calc(50% + 1px)';right='1px';}
      }

      const b=document.createElement('div');
      b.className='ev-block';
      b.style.cssText=`top:${topPx}px;height:${height}px;left:${left};right:${right};background:${ev.color};`;
      b.innerHTML=`<button class="ev-del" onclick="delEv(${idx})">✕</button><div class="ev-title">${esc(ev.title||'(제목 없음)')}</div><div class="ev-time">${ev.start}~${ev.end}</div>`;
      b.addEventListener('dblclick',()=>editEv(idx));
      grid.appendChild(b);
    });
  }

  // 모달
  function buildPalette(){
    const p=document.getElementById('palette'); p.innerHTML='';
    COLORS.forEach(c=>{
      const d=document.createElement('div');
      d.className='cdot'+(c===color?' selected':'');
      d.style.background=c;
      d.onclick=()=>{color=c;document.querySelectorAll('.cdot').forEach(x=>x.classList.remove('selected'));d.classList.add('selected');};
      p.appendChild(d);
    });
  }

  function buildTimeSels(start, end){
    const ms=document.getElementById('mstart'), me=document.getElementById('mend');
    ms.innerHTML=me.innerHTML='';
    SLOTS.forEach(s=>{
      const o=document.createElement('option'); o.value=s; o.textContent=s; ms.appendChild(o);
    });
    [...SLOTS, pad(E)+':00'].forEach(s=>{
      const o=document.createElement('option'); o.value=s; o.textContent=s; me.appendChild(o);
    });
    const now=new Date();
    const nowSlot=pad(now.getHours())+':'+(now.getMinutes()<30?'00':'30');
    const ni=si(nowSlot);
    ms.value=start||(ni>=0?nowSlot:SLOTS[0]);
    me.value=end||(ni>=0&&ni<SLOTS.length-1?SLOTS[ni+1]:pad(E)+':00');
    ms.onchange=()=>{
      const i=si(ms.value), j=si(me.value);
      if(j<=i) me.value=i<SLOTS.length-1?SLOTS[i+1]:pad(E)+':00';
    };
  }

  function openModal(start, end){
    buildPalette();
    document.getElementById('minput').value='';
    const ov=document.getElementById('modal');
    const mrange=document.getElementById('mrange');
    const mtime=document.getElementById('mtime');
    if(start&&end){
      mrange.textContent=start+' ~ '+end; mrange.style.display='block';
      mtime.style.display='none';
      ov.dataset.start=start; ov.dataset.end=end;
    } else {
      mrange.style.display='none';
      mtime.style.display='flex';
      buildTimeSels('','');
      ov.dataset.start=''; ov.dataset.end='';
    }
    delete ov.dataset.editIdx;
    ov.classList.add('open');
    setTimeout(()=>document.getElementById('minput').focus(),50);
  }

  function openManual(){openModal('','');}
  function closeModal(){document.getElementById('modal').classList.remove('open');}

  function saveEvent(){
    const ov=document.getElementById('modal');
    const title=document.getElementById('minput').value.trim();
    const mtime=document.getElementById('mtime');
    let start=ov.dataset.start, end=ov.dataset.end;
    if(mtime.style.display==='flex'){
      start=document.getElementById('mstart').value;
      end=document.getElementById('mend').value;
    }
    if(!start||!end||start>=end){showToast('시간을 올바르게 선택해주세요!');return;}
    const editIdx=ov.dataset.editIdx;
    if(editIdx!==undefined&&editIdx!==''){evs[parseInt(editIdx)]={title,start,end,color};}
    else{evs.push({title,start,end,color});}
    localStorage.setItem('tt-v3',JSON.stringify(evs));
    renderEvs(); closeModal();
    showToast(title?'"'+title+'" 추가됨!':'일정 추가됨!');
  }

  function editEv(idx){
    const ev=evs[idx]; color=ev.color;
    openModal(ev.start,ev.end);
    document.getElementById('minput').value=ev.title||'';
    document.getElementById('modal').dataset.editIdx=idx;
  }

  function delEv(idx){
    evs.splice(idx,1);
    localStorage.setItem('tt-v3',JSON.stringify(evs));
    renderEvs(); showToast('삭제됐어요!');
  }

  function clearAll(){
    if(!confirm('모든 일정을 삭제할까요?'))return;
    evs=[];localStorage.setItem('tt-v3',JSON.stringify(evs));
    renderEvs(); showToast('전체 삭제됐어요!');
  }

  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  document.getElementById('minput').addEventListener('keydown',e=>{
    if(e.key==='Enter')saveEvent();
    if(e.key==='Escape')closeModal();
  });

  buildGrid();
  setTimeout(()=>{
    const now=new Date();
    const mins=(now.getHours()-S)*60+now.getMinutes();
    if(mins>0)document.getElementById('scroll').scrollTop=Math.max(0,(mins/60*ROW_H)-100);
  },100);
</script>
</body>
</html>
