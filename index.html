<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion Custom Todo Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #007bff;
            --text-color: #333333;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding: 15px;
            margin: 0;
            transition: all 0.3s ease;
        }
        /* 헤더 및 설정 창 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .config-panel { 
            display: none; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px;
        }
        .config-item { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
        
        /* 투두 리스트 아이템 */
        .todo-item { display: flex; align-items: flex-start; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .todo-checkbox { 
            width: 20px; height: 20px; margin-right: 12px; cursor: pointer; accent-color: var(--accent-color);
        }
        .todo-info { flex: 1; }
        .todo-title { font-weight: 600; font-size: 15px; margin-bottom: 3px; }
        .todo-desc { font-size: 13px; opacity: 0.7; line-height: 1.4; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        
        /* 버튼 스타일 */
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--text-color); opacity: 0.6; }
        .btn-icon:hover { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <strong id="today-date">Today</strong>
    <button class="btn-icon" onclick="toggleConfig()">⚙️</button>
</div>

<div id="config-panel" class="config-panel">
    <div class="config-item">
        <span>배경색</span>
        <input type="color" id="bgPicker" onchange="updateTheme('bg', this.value)">
    </div>
    <div class="config-item">
        <span>포인트색</span>
        <input type="color" id="accentPicker" onchange="updateTheme('accent', this.value)">
    </div>
    <div class="config-item">
        <span>글자색</span>
        <input type="color" id="textPicker" onchange="updateTheme('text', this.value)">
    </div>
    <div style="text-align: right; margin-top: 5px;">
        <small style="cursor:pointer" onclick="resetTheme()">초기화</small>
    </div>
</div>

<div id="todo-list">데이터를 불러오는 중...</div>

<script>
    // --- 설정값 (여기에 본인의 정보를 입력하세요) ---
    const NOTION_API_KEY = "YOUR_NOTION_SECRET"; 
    const DATABASE_ID = "324aa4316f2f8028965ae1587523d014";
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/"; // CORS 해결용

    // 테마 설정 불러오기/저장
    function updateTheme(type, value) {
        if(type === 'bg') document.documentElement.style.setProperty('--bg-color', value);
        if(type === 'accent') document.documentElement.style.setProperty('--accent-color', value);
        if(type === 'text') document.documentElement.style.setProperty('--text-color', value);
        
        const settings = JSON.parse(localStorage.getItem('widget-style') || '{}');
        settings[type] = value;
        localStorage.setItem('widget-style', JSON.stringify(settings));
    }

    function loadTheme() {
        const settings = JSON.parse(localStorage.getItem('widget-style') || '{"bg":"#ffffff","accent":"#007bff","text":"#333333"}');
        updateTheme('bg', settings.bg);
        updateTheme('accent', settings.accent);
        updateTheme('text', settings.text);
        document.getElementById('bgPicker').value = settings.bg;
        document.getElementById('accentPicker').value = settings.accent;
        document.getElementById('textPicker').value = settings.text;
    }

    function toggleConfig() {
        const panel = document.getElementById('config-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function resetTheme() {
        localStorage.removeItem('widget-style');
        location.reload();
    }

    // --- 노션 API 연동 ---
    async function fetchTodos() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('today-date').innerText = today;

        try {
            const response = await fetch(`${PROXY_URL}https://api.notion.com/v1/databases/${DATABASE_ID}/query`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${NOTION_API_KEY}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    filter: { property: "날짜", date: { equals: today } }
                })
            });

            const data = await response.json();
            renderTodos(data.results);
        } catch (e) {
            document.getElementById('todo-list').innerText = "오류 발생: API 설정을 확인하세요.";
        }
    }

    function renderTodos(todos) {
        const listDiv = document.getElementById("todo-list");
        if (todos.length === 0) {
            listDiv.innerHTML = "<p style='font-size:13px; opacity:0.5;'>오늘 할 일이 없습니다.</p>";
            return;
        }
        
        listDiv.innerHTML = "";
        todos.forEach(page => {
            const props = page.properties;
            const id = page.id;
            const title = props["업무"]?.title[0]?.plain_text || "제목 없음";
            const desc = props["업무 내용"]?.rich_text[0]?.plain_text || "";
            const isDone = props["완료"]?.checkbox || false;

            const item = document.createElement("div");
            item.className = "todo-item";
            item.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${isDone ? 'checked' : ''} onchange="toggleTodo('${id}', this.checked)">
                <div class="todo-info">
                    <div class="todo-title ${isDone ? 'completed' : ''}">${title}</div>
                    <div class="todo-desc">${desc}</div>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    async function toggleTodo(pageId, checked) {
        await fetch(`${PROXY_URL}https://api.notion.com/v1/pages/${pageId}`, {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${NOTION_API_KEY}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                properties: { "완료": { checkbox: checked } }
            })
        });
        fetchTodos();
    }

    // 초기 실행
    loadTheme();
    fetchTodos();
</script>
</body>
</html>
