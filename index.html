<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Tasks</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/KoPubDotum@latest/KoPubDotum.css">
  <link href="https://fonts.googleapis.com/css2?family=Freesentation:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f8f9fa;
      --surface:  #ffffff;
      --border:   #f1f3f5;
      --point:    #5c7cfa;
      --tag-bg:   #343a40;
      --tag-txt:  #ffffff;
      --txt:      #212529;
      --txt-mute: #adb5bd;
      --radius:   20px;
      --shadow:   0 8px 20px rgba(0,0,0,0.06);
      --font-body: 'KoPubDotum', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      padding: 20px 14px 90px;
      display: flex;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
      border: 1.5px solid #ced4da;
      border-radius: var(--radius);
    }

    .widget-container { width: 100%; max-width: 300px; }

    /* ── 헤더 ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px 2px 10px;
    }

    .date-main {
      font-family: 'Freesentation', 'KoPubDotum', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .date-sub {
      font-size: 11px;
      color: var(--txt-mute);
      margin-top: 5px;
      padding-left: 2px;
    }

    .header-actions { display: flex; gap: 8px; align-items: center; }

    .icon-btn {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: transform .2s;
    }
    .icon-btn:active { transform: scale(0.88); }
    .icon-btn.spinning { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 설정 패널 ── */
    .settings-panel {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      display: none;
      flex-wrap: wrap;
      gap: 14px;
    }
    .settings-panel.open { display: flex; }

    .setting-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: var(--txt-mute);
    }
    .setting-row label { white-space: nowrap; font-weight: 700; }
    input[type="color"] {
      border: 1px solid #dee2e6;
      border-radius: 6px;
      width: 30px; height: 26px;
      padding: 2px;
      cursor: pointer;
      background: none;
    }

    /* ── 진행률 (하단 고정) ── */
    .progress-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      padding: 10px 18px 16px;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      z-index: 100;
      border-radius: 28px 28px 0 0;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-weight: 700;
      color: var(--txt-mute);
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 6px;
      background: #e9ecef;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #748ffc, #5c7cfa);
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── 할 일 목록 ── */
    #todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      animation: fadeUp .3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item.done {
      opacity: 0.55;
      box-shadow: none;
      background: #f1f3f5;
    }

    /* 체크박스 */
    .cb-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
    .cb-wrap input { opacity: 0; position: absolute; width: 0; height: 0; }
    .cb-box {
      width: 22px; height: 22px;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cb-wrap input:checked + .cb-box {
      background: var(--point);
      border-color: var(--point);
    }
    .cb-box svg { width: 11px; display: none; }
    .cb-wrap input:checked + .cb-box svg { display: block; }

    /* 한 줄 레이아웃 */
    .todo-body { flex: 1; min-width: 0; }
    .todo-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 8px;
      background: var(--tag-bg);
      color: #fff;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: -0.2px;
    }

    .todo-title {
      font-size: 13px;
      font-weight: 500;
      color: #495057;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .todo-item.done .todo-title { text-decoration: line-through; color: var(--txt-mute); }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--tag-bg);
      color: #fff;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="widget-container">

  <!-- 헤더 -->
  <div class="header">
    <div>
      <div class="date-main" id="today-date">—</div>
      <div class="date-sub" id="today-sub">—</div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" onclick="moveDate(-1)">‹</div>
      <div class="icon-btn" onclick="moveDate(1)">›</div>
      <div class="icon-btn" id="refresh-btn" onclick="fetchTodos()">↻</div>
      <div class="icon-btn" onclick="toggleSettings()">⚙</div>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settings-panel">
    <div class="setting-row">
      <label>배경</label>
      <input type="color" value="#f8f9fa" oninput="setVar('--bg', this.value)" />
    </div>
    <div class="setting-row">
      <label>카드</label>
      <input type="color" value="#ffffff" oninput="setVar('--surface', this.value)" />
    </div>
    <div class="setting-row">
      <label>포인트</label>
      <input type="color" value="#5c7cfa" oninput="setVar('--point', this.value)" />
    </div>
    <div class="setting-row">
      <label>태그</label>
      <input type="color" value="#343a40" oninput="setVar('--tag-bg', this.value)" />
    </div>
    <div class="setting-row">
      <label>글자</label>
      <input type="color" value="#212529" oninput="setVar('--txt', this.value)" />
    </div>
  </div>

  <!-- 진행률 -->
  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-meta">
      <span id="progress-label">Task Done</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- 할 일 목록 -->
  <div id="todo-list">
    <div style="text-align:center; padding:40px; color:#adb5bd; font-size:14px;">불러오는 중...</div>
  </div>

</div>
<div id="toast"></div>

<script>
  // ── 날짜 상태 ──
  const realToday = new Date();
  const DAYS = ['일','월','화','수','목','금','토'];
  let viewDate = new Date(realToday); // 현재 보고 있는 날짜

  function pad(n) { return String(n).padStart(2, '0'); }

  function getDateStr(date) {
    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
  }

  function isToday(date) {
    return getDateStr(date) === getDateStr(realToday);
  }

  function updateDateHeader() {
    const m = viewDate.getMonth() + 1;
    const d = viewDate.getDate();
    const y = viewDate.getFullYear();
    document.getElementById('today-date').textContent = `${pad(m)}.${pad(d)}`;
    const label = isToday(viewDate) ? '오늘' : '';
    document.getElementById('today-sub').textContent =
      `${y}년 ${m}월 ${d}일 (${DAYS[viewDate.getDay()]})${label ? ' · ' + label : ''}`;
  }

  function moveDate(dir) {
    viewDate.setDate(viewDate.getDate() + dir);
    updateDateHeader();
    fetchTodos();
  }

  updateDateHeader();

  // ── 디자인 ──
  function setVar(prop, val) { document.documentElement.style.setProperty(prop, val); }
  function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

  // ── 데이터 불러오기 ──
  async function fetchTodos() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    const todayStr = getDateStr(viewDate);
    try {
      const res = await fetch('/api/notion?action=query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filter: { property: '날짜', date: { equals: todayStr } },
          sorts: [{ timestamp: 'created_time', direction: 'ascending' }]
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || JSON.stringify(data, null, 2)); return; }
      render(data.results || []);
    } catch (e) {
      showError('네트워크 에러: ' + e.message);
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ── 렌더링 ──
  function render(items) {
    const list = document.getElementById('todo-list');
    const progressWrap = document.getElementById('progress-wrap');

    if (items.length === 0) {
      list.innerHTML = `<div style="text-align:center; padding:40px; font-size:14px; color:#adb5bd;">오늘의 할 일이 없습니다 🕊️</div>`;
      progressWrap.style.display = 'none';
      return;
    }

    const doneCount = items.filter(i => i.properties?.['완']?.checkbox).length;
    const pct = Math.round((doneCount / items.length) * 100);
    progressWrap.style.display = 'block';
    document.getElementById('progress-label').textContent = `${doneCount} / ${items.length} 완료`;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    // 태그 첫 번째 이름 기준 가나다 정렬 (태그 없으면 맨 뒤)
    items.sort((a, b) => {
      const tagA = a.properties?.['업무']?.multi_select?.[0]?.name || 'ㅿ';
      const tagB = b.properties?.['업무']?.multi_select?.[0]?.name || 'ㅿ';
      return tagA.localeCompare(tagB, 'ko');
    });

    list.innerHTML = '';
    items.forEach((item, idx) => {
      const p       = item.properties;
      const content = p['업무 내용']?.title?.[0]?.plain_text || '(내용 없음)';
      const tags    = p['업무']?.multi_select || [];
      const done    = p['완']?.checkbox || false;
      const id      = item.id;

      const div = document.createElement('div');
      div.className = 'todo-item' + (done ? ' done' : '');
      div.style.animationDelay = (idx * 0.05) + 's';
      div.innerHTML = `
        <label class="cb-wrap">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="updateTodo('${id}', this.checked, this)" />
          <div class="cb-box">
            <svg viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </label>
        <div class="todo-body">
          <div class="todo-row">
            ${tags.map(t => `<span class="tag" style="background:${getTagColor(t.color)}">${escapeHtml(t.name)}</span>`).join('')}
            <div class="todo-title">${escapeHtml(content)}</div>
          </div>
        </div>`;
      list.appendChild(div);
    });
  }

  // ── 체크박스 업데이트 ──
  async function updateTodo(pageId, checked, cbEl) {
    const item = cbEl.closest('.todo-item');
    item.classList.toggle('done', checked);
    try {
      const res = await fetch(`/api/notion?pageId=${pageId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ properties: { '완': { checkbox: checked } } })
      });
      if (!res.ok) {
        showToast('업데이트 실패');
        cbEl.checked = !checked;
        item.classList.toggle('done', !checked);
        return;
      }
      updateProgress();
      showToast(checked ? '오늘도 수고했어요! ✨' : '다시 힘내볼까요? 🔥');
    } catch (e) { showToast('오류 발생'); }
  }

  function updateProgress() {
    const items = document.querySelectorAll('.todo-item');
    const done  = document.querySelectorAll('.todo-item.done');
    const pct   = items.length ? Math.round((done.length / items.length) * 100) : 0;
    document.getElementById('progress-label').textContent = `${done.length} / ${items.length} 완료`;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function showError(msg) {
    document.getElementById('todo-list').innerHTML = `<div style="background:#fff5f5;border:1px solid #fecaca;border-radius:16px;padding:16px;color:#b91c1c;font-size:13px;white-space:pre-wrap;">⚠️ ${msg}</div>`;
    document.getElementById('progress-wrap').style.display = 'none';
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── 노션 태그 색상 매핑 ──
  const NOTION_COLORS = {
    default:  '#343a40',
    gray:     '#868e96',
    brown:    '#a0522d',
    orange:   '#e8590c',
    yellow:   '#f59f00',
    green:    '#2f9e44',
    blue:     '#1c7ed6',
    purple:   '#ae3ec9',
    pink:     '#d6336c',
    red:      '#f03e3e',
  };

  function getTagColor(notionColor) {
    return NOTION_COLORS[notionColor] || NOTION_COLORS.default;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  fetchTodos();
  setInterval(fetchTodos, 5 * 60 * 1000); // 5분마다 자동 갱신
</script>
</body>
</html>
