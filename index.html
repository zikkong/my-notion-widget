<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 업무 포커스</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: transparent; margin: 0; padding: 10px; }
        .widget-card { background: white; border-radius: 12px; padding: 16px; border: 1.5px solid #ffeded; box-shadow: 0 4px 12px rgba(255, 77, 77, 0.08); }
        .header { display: flex; align-items: center; font-size: 15px; font-weight: 800; color: #eb5757; margin-bottom: 15px; border-bottom: 2px solid #ffeded; padding-bottom: 8px; }
        .task-item { display: flex; align-items: flex-start; margin-bottom: 10px; padding: 4px 0; border-bottom: 1px solid #fafafa; }
        .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #fff0f0; color: #eb5757; font-weight: bold; margin-right: 10px; white-space: nowrap; margin-top: 2px; }
        .task-content { font-size: 13.5px; color: #37352f; line-height: 1.5; font-weight: 500; }
        .empty { text-align: center; color: #999; padding: 30px 0; font-size: 13px; }
    </style>
</head>
<body>
    <div class="widget-card">
        <div id="date-title" class="header">📅 로딩 중...</div>
        <div id="list-container"><div class="empty">데이터를 가져오고 있습니다...</div></div>
    </div>

    <script>
        // ⚠️ [필독] 아래 두 항목을 본인의 값으로 정확히 수정해 주세요!
        const TOKEN = 'secret_여기에_프라이빗_통합_토큰_넣기'; 
        const DB_ID = '324aa4316f2f8028965ae1587523d014'; // 보내주신 링크의 ID입니다.

        async function fetchTasks() {
            // 한국 시간(KST) 기준 오늘 날짜 구하기
            const now = new Date();
            const kstDate = new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];
            document.getElementById('date-title').innerText = `📅 ${kstDate.split('-')[1]}월 ${kstDate.split('-')[2]}일 집중 업무`;

            try {
                // 보안 문제(CORS) 해결을 위한 무료 프록시 서버 활용
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/'; 
                const notionUrl = `https://api.notion.com/v1/databases/${DB_ID}/query`;

                const response = await fetch(proxyUrl + notionUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json',
                        'x-requested-with': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "날짜",
                            date: { equals: kstDate }
                        }
                    })
                });

                // 💡 만약 위 프록시가 막혔을 때를 대비한 2차 시도 (직접 요청)
                if (response.status === 403) {
                    console.log("프록시 차단됨, 직접 요청 시도...");
                    // (이 부분은 브라우저 설정에 따라 다를 수 있음)
                }

                const data = await response.json();
                renderTasks(data.results);
            } catch (error) {
                document.getElementById('list-container').innerHTML = `<div class="empty">연결 확인 중... (데이터베이스 공유 설정을 확인해 보세요)</div>`;
                console.error(error);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('list-container');
            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty">오늘 예정된 업무가 없네요! ☕</div>';
                return;
            }

            container.innerHTML = tasks.map(task => {
                const title = task.properties['업무 내용']?.title[0]?.plain_text || '내용 없음';
                const team = task.properties['업무']?.select?.name || '기타';
                return `
                    <div class="task-item">
                        <span class="tag">${team}</span>
                        <span class="task-content">${title}</span>
                    </div>
                `;
            }).join('');
        }

        fetchTasks();
    </script>
</body>
</html>
