<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Today's Tasks</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/KoPubDotum@latest/KoPubDotum.css">
  <style>
    :root {
      --bg:         #f8f9fa; /* 밝고 깨끗한 배경 */
      --surface:    #ffffff;
      --border:     #f1f3f5;
      --point:      #5c7cfa; /* 부드러운 블루 */
      --tag-bg:     #343a40; /* 요청하신 어두운 태그 배경 */
      --tag-txt:    #ffffff;
      --txt:        #212529;
      --txt-mute:   #adb5bd;
      --radius:     24px;   /* 아주 둥근 모서리 */
      --shadow:     0 8px 20px rgba(0,0,0,0.06);
      --font-body:  'KoPubDotum', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
    }

    .widget-container {
      width: 100%;
      max-width: 400px;
    }

    /* ── 헤더 ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 0 8px;
    }
    .date-main {
      font-size: 20px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.5px;
    }
    .refresh-btn {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      transition: transform 0.2s;
    }
    .refresh-btn:active { transform: scale(0.9); }

    /* ── 진행률 (이미지 속 게이지 느낌) ── */
    .progress-wrap {
      background: var(--surface);
      padding: 18px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 6px;
      background: #e9ecef;
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #748ffc, #5c7cfa);
      border-radius: 10px;
      transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* ── 할 일 목록 ── */
    #todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: var(--shadow);
      transition: all 0.3s;
      border: 1px solid transparent;
    }
    .todo-item.done {
      opacity: 0.6;
      box-shadow: none;
      background: #f1f3f5;
    }

    /* 체크박스 디자인 */
    .cb-wrap { position: relative; width: 22px; height: 22px; flex-shrink: 0; }
    .cb-wrap input { opacity: 0; position: absolute; }
    .cb-box {
      width: 22px; height: 22px;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cb-wrap input:checked + .cb-box {
      background: var(--point);
      border-color: var(--point);
    }
    .cb-box svg { width: 11px; display: none; }
    .cb-wrap input:checked + .cb-box svg { display: block; }

    /* 한 줄 텍스트 및 태그 */
    .todo-body { flex: 1; min-width: 0; }
    .todo-row { display: flex; align-items: center; gap: 10px; }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 8px;
      background: var(--tag-bg); /* 어두운 배경 */
      color: var(--tag-txt);    /* 하얀 글씨 */
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: -0.2px;
    }

    .todo-title {
      font-size: 14.5px;
      font-weight: 500;
      color: #495057;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .todo-item.done .todo-title { text-decoration: line-through; color: var(--txt-mute); }

    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--tag-bg);
      color: #fff;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 13px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="widget-container">
  <div class="header">
    <div class="date-main" id="today-date">03.19 (목)</div>
    <button class="refresh-btn" onclick="fetchTodos()">↻</button>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-meta">
      <span id="progress-label">Task Done</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
  </div>

  <div id="todo-list">
    <div style="text-align:center; padding:40px; color:#adb5bd; font-size:14px;">불러오는 중...</div>
  </div>
</div>

<div id="toast"></div>

<script>
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  const DAYS = ['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent = `${today.getMonth()+1}.${today.getDate()} (${DAYS[today.getDay()]})`;

  async function fetchTodos() {
    try {
      const res = await fetch('/api/notion?action=query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filter: { property: '날짜', date: { equals: todayStr } },
          sorts: [{ timestamp: 'created_time', direction: 'ascending' }]
        })
      });
      const data = await res.json();
      render(data.results || []);
    } catch (e) { showToast('데이터 로드 실패'); }
  }

  function render(items) {
    const list = document.getElementById('todo-list');
    const progressWrap = document.getElementById('progress-wrap');
    
    if (items.length === 0) {
      list.innerHTML = `<div style="text-align:center; padding:40px; font-size:14px; color:#adb5bd;">오늘의 할 일이 없습니다 🕊️</div>`;
      progressWrap.style.display = 'none';
      return;
    }

    const doneCount = items.filter(i => i.properties?.['완']?.checkbox).length;
    const pct = Math.round((doneCount / items.length) * 100);
    progressWrap.style.display = 'block';
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';

    list.innerHTML = '';
    items.forEach(item => {
      const p = item.properties;
      const content = p['업무 내용']?.title?.[0]?.plain_text || '(내용 없음)';
      const tags = p['업무']?.multi_select || [];
      const done = p['완']?.checkbox || false;
      const id = item.id;

      const div = document.createElement('div');
      div.className = 'todo-item' + (done ? ' done' : '');
      div.innerHTML = `
        <label class="cb-wrap">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="updateTodo('${id}', this.checked, this)" />
          <div class="cb-box"><svg viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </label>
        <div class="todo-body">
          <div class="todo-row">
            ${tags.map(t => `<span class="tag">${t.name}</span>`).join('')}
            <div class="todo-title">${content}</div>
          </div>
        </div>`;
      list.appendChild(div);
    });
  }

  async function updateTodo(pageId, checked, cbEl) {
    cbEl.closest('.todo-item').classList.toggle('done', checked);
    try {
      await fetch(`/api/notion?pageId=${pageId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ properties: { '완': { checkbox: checked } } })
      });
      updateProgress();
      showToast(checked ? '오늘도 수고했어요! ✨' : '다시 힘내볼까요? 🔥');
    } catch (e) { showToast('오류 발생'); }
  }

  function updateProgress() {
    const items = document.querySelectorAll('.todo-item');
    const done = document.querySelectorAll('.todo-item.done');
    const pct = items.length ? Math.round((done.length / items.length) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  fetchTodos();
</script>
</body>
</html>
