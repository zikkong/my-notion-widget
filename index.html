<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notion 업무 로그 위젯</title>
    <style>
        :root { --bg: #ffffff; --point: #007bff; --txt: #333; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--txt); padding: 20px; margin: 0; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--point); padding-bottom: 10px; }
        .config-panel { display: none; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; }
        .todo-item { display: flex; align-items: flex-start; margin-bottom: 15px; padding: 12px; background: rgba(0,0,0,0.02); border-radius: 8px; border: 1px solid rgba(0,0,0,0.05); }
        .todo-checkbox { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; accent-color: var(--point); }
        .todo-info { flex: 1; }
        .todo-content { font-weight: bold; font-size: 16px; margin-bottom: 6px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { font-size: 11px; padding: 3px 8px; border-radius: 5px; background: var(--point); color: white; font-weight: 500; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        #error-display { display: none; margin-top: 20px; padding: 15px; background: #fff5f5; border: 1px solid #ffcccc; color: #cc0000; border-radius: 8px; font-size: 13px; white-space: pre-wrap; }
        button { cursor: pointer; border: none; background: none; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <div id="today-date" style="font-size: 18px; font-weight: 800;">날짜 확인 중...</div>
    <div>
        <button onclick="fetchTodos()">🔄</button>
        <button onclick="toggleConfig()">⚙️</button>
    </div>
</div>

<div id="config-panel" class="config-panel">
    <strong>🎨 디자인 커스텀</strong><br><br>
    배경색: <input type="color" onchange="updateStyle('--bg', this.value)" value="#ffffff"> 
    포인트: <input type="color" onchange="updateStyle('--point', this.value)" value="#007bff"> 
    글자색: <input type="color" onchange="updateStyle('--txt', this.value)" value="#333333">
</div>

<div id="todo-list">데이터를 불러오고 있습니다...</div>
<div id="error-display"></div>

<script>
    // 1. 정보를 정확히 입력하세요
    const TOKEN = "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"; // 스크린샷의 전체 토큰 복사
    const DB_ID = "317aa4316f2f80fe9e95e66e0d1e846e"; 
    const PROXY = "https://cors-anywhere.herokuapp.com/";

    function updateStyle(prop, val) { document.documentElement.style.setProperty(prop, val); }
    function toggleConfig() { const p = document.getElementById('config-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

    async function fetchTodos() {
        const listDiv = document.getElementById("todo-list");
        const errDiv = document.getElementById("error-display");
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('today-date').innerText = "📅 " + today;

        try {
            const response = await fetch(`${PROXY}https://api.notion.com/v1/databases/${DB_ID}/query`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${TOKEN.trim()}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    filter: { property: "날짜", date: { equals: today } }
                })
            });

            const data = await response.json();

            if (!response.ok) {
                errDiv.style.display = "block";
                errDiv.innerText = `[에러 발생]\n코드: ${data.code}\n메시지: ${data.message}\n\n팁: 'Invalid Token'이 뜬다면 토큰 복사가 잘못되었거나 노션 페이지 연결을 다시 확인하세요.`;
                return;
            }

            render(data.results);
            errDiv.style.display = "none";
        } catch (e) {
            errDiv.style.display = "block";
            errDiv.innerText = "네트워크 에러: CORS 프록시 승인이 필요할 수 있습니다.\nhttps://cors-anywhere.herokuapp.com/corsdemo 접속 후 버튼을 누르세요.";
        }
    }

    function render(items) {
        const listDiv = document.getElementById("todo-list");
        if (items.length === 0) {
            listDiv.innerHTML = "<p style='opacity:0.6;'>오늘 등록된 업무가 없습니다.</p>";
            return;
        }

        listDiv.innerHTML = "";
        items.forEach(item => {
            const p = item.properties;
            const content = p["업무 내용"]?.title?.[0]?.plain_text || "내용 없음"; // 제목
            const tags = p["업무"]?.multi_select || []; // 다중선택
            const done = p["완"]?.checkbox || false; // 체크박스

            const row = document.createElement("div");
            row.className = "todo-item";
            row.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${done ? 'checked' : ''} onchange="updateTodo('${item.id}', this.checked)">
                <div class="todo-info">
                    <div class="todo-content ${done ? 'completed' : ''}">${content}</div>
                    <div class="tag-container">${tags.map(t => `<span class="tag">${t.name}</span>`).join('')}</div>
                </div>
            `;
            listDiv.appendChild(row);
        });
    }

    async function updateTodo(pageId, checked) {
        await fetch(`${PROXY}https://api.notion.com/v1/pages/${pageId}`, {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${TOKEN.trim()}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ properties: { "완": { checkbox: checked } } })
        });
        fetchTodos();
    }

    fetchTodos();
</script>
</body>
</html>
