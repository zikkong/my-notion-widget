<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Notion Todo Widget</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --accent-color: #007bff;
            --text-color: #333333;
        }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-color); 
            padding: 15px; margin: 0;
        }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .todo-item { display: flex; align-items: flex-start; margin-bottom: 15px; }
        .todo-checkbox { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; accent-color: var(--accent-color); }
        .todo-info { flex: 1; }
        
        /* 업무 내용 (제목 속성) */
        .todo-content { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        
        /* 업무 (다중 선택 속성) */
        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { 
            font-size: 11px; padding: 2px 6px; border-radius: 4px; 
            background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1);
        }
        
        .completed { text-decoration: line-through; opacity: 0.5; }
        #status { font-size: 12px; color: red; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <span id="date-str">오늘의 할 일</span>
    <span style="cursor:pointer" onclick="fetchTodos()">🔄</span>
</div>

<div id="todo-list">불러오는 중...</div>
<div id="status"></div>

<script>
    // 1. 여기에 본인의 정보를 입력하세요
    const NOTION_API_KEY = "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"; 
    const DATABASE_ID = "317aa4316f2f80fe9e95e66e0d1e846e";
    const PROXY_URL = "https://cors-anywhere.herokuapp.com/";

    async function fetchTodos() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-str').innerText = today;

        try {
            const response = await fetch(`${PROXY_URL}https://api.notion.com/v1/databases/${DATABASE_ID}/query`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${NOTION_API_KEY}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    filter: { property: "날짜", date: { equals: today } }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.message);
            renderTodos(data.results);
        } catch (e) {
            document.getElementById('status').innerText = "에러: " + e.message;
        }
    }

    function renderTodos(todos) {
        const listDiv = document.getElementById("todo-list");
        if (todos.length === 0) {
            listDiv.innerHTML = "<p style='font-size:13px; color:#999;'>오늘 할 일이 없습니다.</p>";
            return;
        }
        
        listDiv.innerHTML = "";
        todos.forEach(page => {
            const p = page.properties;
            
            // 데이터 매핑 (사용자 설정 기준)
            const content = p["업무 내용"]?.title[0]?.plain_text || "내용 없음"; // 제목
            const tags = p["업무"]?.multi_select || []; // 다중 선택
            const isDone = p["완"]?.checkbox || false; // 체크박스

            const item = document.createElement("div");
            item.className = "todo-item";
            
            // 다중 선택 태그 생성
            const tagHtml = tags.map(t => `<span class="tag">${t.name}</span>`).join('');

            item.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${isDone ? 'checked' : ''} 
                       onchange="toggleTodo('${page.id}', this.checked)">
                <div class="todo-info">
                    <div class="todo-content ${isDone ? 'completed' : ''}">${content}</div>
                    <div class="tag-container">${tagHtml}</div>
                </div>
            `;
            listDiv.appendChild(item);
        });
    }

    async function toggleTodo(pageId, checked) {
        await fetch(`${PROXY_URL}https://api.notion.com/v1/pages/${pageId}`, {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${NOTION_API_KEY}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                properties: { "완": { checkbox: checked } }
            })
        });
        fetchTodos();
    }

    fetchTodos();
</script>
</body>
</html>
