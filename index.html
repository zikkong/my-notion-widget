<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 업무 위젯</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: transparent; margin: 0; padding: 10px; }
        .widget-card { background: white; border-radius: 12px; padding: 15px; border: 1px solid #e0e0e0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header { font-size: 14px; font-weight: bold; color: #ff4d4d; border-bottom: 2px solid #ff4d4d; padding-bottom: 5px; margin-bottom: 12px; }
        .task-item { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .tag { font-size: 10px; background: #f1f1f1; padding: 2px 6px; border-radius: 4px; margin-right: 8px; color: #666; font-weight: bold; }
        .empty { text-align: center; color: #999; padding: 20px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="widget-card">
        <div id="date-title" class="header">오늘의 업무</div>
        <div id="list-container"><div class="empty">데이터 불러오는 중...</div></div>
    </div>

    <script>
        // ⚠️ 여기만 본인 정보로 정확히 바꿔주세요!
        const TOKEN = '여기에_SECRET_토큰_넣기';
        const DB_ID = '317aa4316f2f80fe9e95e66e0d1e846e'; // 알려주신 ID 적용됨

        async function fetchTasks() {
            // 한국 시간 기준 오늘 날짜 생성
            const now = new Date();
            const kstDate = new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().split('T')[0];
            document.getElementById('date-title').innerText = `📅 ${kstDate} 집중 업무`;

            try {
                // CORS 문제를 해결하기 위해 프록시 서버(cors-anywhere의 공개 버전 등)를 경유합니다.
                const proxyUrl = 'https://cors-anywhere.herokuapp.com/'; 
                const notionUrl = `https://api.notion.com/v1/databases/${DB_ID}/query`;

                const response = await fetch(notionUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Notion-Version': '2022-06-28',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filter: {
                            property: "날짜",
                            date: { equals: kstDate }
                        }
                    })
                });

                const data = await response.json();
                
                if (data.results) {
                    renderTasks(data.results);
                } else {
                    throw new Error('데이터 형식이 잘못되었습니다.');
                }
            } catch (error) {
                // 만약 위 방법이 막히면 에러 메시지를 띄웁니다.
                document.getElementById('list-container').innerHTML = `<div class="empty">연결 오류: 보안 정책(CORS)으로 인해 데이터를 불러올 수 없습니다.</div>`;
                console.error(error);
            }
        }

        function renderTasks(tasks) {
            const container = document.getElementById('list-container');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="empty">오늘 예정된 업무가 없네요! ☕</div>';
                return;
            }

            container.innerHTML = tasks.map(task => {
                const title = task.properties['업무 내용']?.title[0]?.plain_text || '내용 없음';
                const team = task.properties['업무']?.select?.name || '기타';
                return `
                    <div class="task-item">
                        <span class="tag">${team}</span>
                        <span>${title}</span>
                    </div>
                `;
            }).join('');
        }

        fetchTasks();
    </script>
</body>
</html>
