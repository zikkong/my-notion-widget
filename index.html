<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Notion Today Todo</title>
    <style>
        :root { --bg: #ffffff; --point: #007bff; --txt: #333; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); padding: 15px; margin: 0; transition: 0.3s; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 8px; }
        .config-btn { cursor: pointer; opacity: 0.5; font-size: 18px; }
        .config-panel { display: none; background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 12px; }
        .todo-item { display: flex; align-items: flex-start; margin-bottom: 12px; }
        .todo-checkbox { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; accent-color: var(--point); }
        .todo-info { flex: 1; }
        .todo-content { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
        .tag-container { display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--point); color: white; }
        .completed { text-decoration: line-through; opacity: 0.5; }
        #error-log { color: #d9534f; font-size: 11px; margin-top: 10px; display: none; background: #f9f2f4; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="header">
    <span id="date-display">Today</span>
    <span class="config-btn" onclick="document.getElementById('config-panel').style.display = (document.getElementById('config-panel').style.display === 'block' ? 'none' : 'block')">⚙️</span>
</div>

<div id="config-panel" class="config-panel">
    색상 커스텀: 
    배경 <input type="color" onchange="changeStyle('--bg', this.value)" value="#ffffff">
    포인트 <input type="color" onchange="changeStyle('--point', this.value)" value="#007bff">
    글자 <input type="color" onchange="changeStyle('--txt', this.value)" value="#333333">
</div>

<div id="todo-list">데이터를 불러오는 중...</div>
<div id="error-log"></div>

<script>
    // ⚠️ 정보 입력
    const TOKEN = "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"; 
    const DB_ID = "317aa4316f2f80fe9e95e66e0d1e846e";
    const PROXY = "https://cors-anywhere.herokuapp.com/"; 

    function changeStyle(prop, val) { document.documentElement.style.setProperty(prop, val); }

    async function fetchTodos() {
        const today = new Date().toLocaleDateString('sv-SE'); // YYYY-MM-DD 형식
        document.getElementById('date-display').innerText = today;
        const errLog = document.getElementById('error-log');

        try {
            const response = await fetch(`${PROXY}https://api.notion.com/v1/databases/${DB_ID}/query`, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${TOKEN}`,
                    "Notion-Version": "2022-06-28",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    filter: { property: "날짜", date: { equals: today } }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(`${data.code}: ${data.message}`);
            
            render(data.results);
            errLog.style.display = "none";
        } catch (e) {
            errLog.style.display = "block";
            errLog.innerText = "⚠️ 오류 발생: " + e.message + "\n(CORS 프록시 서버 승인이 필요할 수 있습니다)";
            document.getElementById('todo-list').innerHTML = "";
        }
    }

    function render(items) {
        const listDiv = document.getElementById("todo-list");
        if (items.length === 0) {
            listDiv.innerHTML = "<p style='font-size:13px;'>오늘 업무가 없습니다.</p>";
            return;
        }
        listDiv.innerHTML = "";
        items.forEach(item => {
            const p = item.properties;
            const content = p["업무 내용"]?.title?.[0]?.plain_text || "내용 없음";
            const tags = p["업무"]?.multi_select || [];
            const done = p["완"]?.checkbox || false;

            const row = document.createElement("div");
            row.className = "todo-item";
            row.innerHTML = `
                <input type="checkbox" class="todo-checkbox" ${done ? 'checked' : ''} onchange="update('${item.id}', this.checked)">
                <div class="todo-info">
                    <div class="todo-content ${done ? 'completed' : ''}">${content}</div>
                    <div class="tag-container">${tags.map(t => `<span class="tag">${t.name}</span>`).join('')}</div>
                </div>
            `;
            listDiv.appendChild(row);
        });
    }

    async function update(id, val) {
        await fetch(`${PROXY}https://api.notion.com/v1/pages/${id}`, {
            method: "PATCH",
            headers: {
                "Authorization": `Bearer ${TOKEN}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ properties: { "완": { checkbox: val } } })
        });
        fetchTodos();
    }

    fetchTodos();
</script>
</body>
</html>
