<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Widget</title>
  <style>
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff');
      font-weight: 300;
    }
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff');
      font-weight: 400;
    }
    @font-face {
      font-family: 'SBAggroOTF';
      src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff');
      font-weight: 700;
    }

    :root {
      --bg:        #ffffff;
      --surface:   #ffffff;
      --border:    #e8ddd5;
      --point:     #615847;
      --point-soft:#FEF8FA;
      --done-bg:   #FDD5E7;
      --check-bg:  #FFF4B1;
      --green-light: #D3EBAD;
      --green-dark:  #C2DF98;
      --txt:       #615847;
      --txt-mute:  #a08c78;
      --radius:    18px;
      --shadow:    0 4px 14px rgba(97,88,71,0.08);
      --font-body: 'SBAggroOTF', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      padding: 16px 16px 24px;
      display: flex;
      justify-content: center;
      transition: background 0.3s;
      border: 2px solid var(--point);
      border-radius: var(--radius);
      position: relative;
    }

    .widget-container { width: 100%; max-width: 100%; }

    /* ── 헤더 ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px 2px 8px;
      margin-bottom: 4px;
      border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .header-actions {
      position: absolute;
      right: 2px;
      top: 10px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .month-main {
      font-family: 'SBAggroOTF', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--txt);
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .icon-btn {
      background: #FDD5E7;
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: var(--txt);
      transition: all 0.15s;
    }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn.spinning { animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 설정 패널 ── */
    .settings-panel {
      background: #FDD5E7;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: none;
      flex-wrap: wrap;
      gap: 10px;
    }
    .settings-panel.open { display: flex; }
    .setting-row { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 300; color: var(--txt-mute); }
    .setting-row label { white-space: nowrap; }
    input[type="color"] {
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 26px; height: 22px;
      padding: 1px; cursor: pointer; background: none;
    }

    /* ── 캘린더 ── */
    .calendar-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 14px;
      margin-top: 12px;
    }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 6px 12px 6px;
      border-bottom: 1px solid var(--border);
      background: #FDD5E7;
    }
    .weekday {
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: var(--txt-mute);
    }
    .weekday:first-child { color: #e07070; }
    .weekday:last-child  { color: #7090c0; }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 8px 12px 14px;
    }

    .day-cell {
      min-height: 64px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .15s;
      padding: 2px;
    }
    .day-cell:hover { background: #FDD5E7; }
    .day-cell.empty { cursor: default; pointer-events: none; }
    .day-cell.today .day-num {
      background: var(--point);
      color: #fff;
      border-radius: 50%;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
    }
    .day-cell.selected { background: #FDD5E7; border: 1.5px solid var(--point); }
    .day-cell.sunday .day-num  { color: #e07070; }
    .day-cell.saturday .day-num { color: #7090c0; }
    .day-cell.today.sunday .day-num,
    .day-cell.today.saturday .day-num { color: #fff; }

    .day-num { font-size: 14px; font-weight: 400; line-height: 1; color: var(--txt); }

    .day-indicator { margin-top: 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; width: 100%; }
    .day-count { font-size: 9px; color: var(--txt-mute); font-weight: 300; line-height: 1; }
    .day-bar-bg { width: 70%; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .day-bar-fill { height: 100%; background: var(--done-bg); border-radius: 99px; transition: width 0.4s ease; }
    .day-bar-fill.done-all { background: var(--green-light); }

    /* ── 선택 날 할일 ── */
    .selected-date-label {
      font-size: 14px;
      font-weight: 700;
      color: var(--txt);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    #task-list { display: flex; flex-direction: column; gap: 6px; }

    .todo-item {
      background: #FDD5E7;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp .25s ease both;
      transition: background 0.2s;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item.done { background: var(--done-bg); border-color: #e8c0cf; }

    .cb-wrap { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
    .cb-wrap input { opacity: 0; position: absolute; width: 0; height: 0; }
    .cb-box {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cb-wrap input:checked + .cb-box { background: var(--check-bg); border-color: var(--border); }
    .cb-box svg { width: 10px; display: none; }
    .cb-wrap input:checked + .cb-box svg { display: block; }

    .todo-body { flex: 1; min-width: 0; }
    .todo-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 10px; font-weight: 400; padding: 2px 8px; border-radius: 7px; color: #fff; flex-shrink: 0; }
    .todo-title { font-size: 13px; font-weight: 300; color: #3d2f22; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .todo-item.done .todo-title { text-decoration: line-through; color: var(--txt-mute); }

    .empty-msg { text-align: center; padding: 24px 0; color: var(--txt-mute); font-size: 13px; font-weight: 300; }
    /* 토스트 */
    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--point);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 300;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="widget-container">

  <!-- 헤더 -->
  <div class="header">
    <div class="month-main" id="month-label">—</div>
    <div class="header-actions">
      <div class="icon-btn" onclick="moveMonth(-1)">‹</div>
      <div class="icon-btn" onclick="moveMonth(1)">›</div>
      <div class="icon-btn" id="refresh-btn" onclick="loadMonth()">↻</div>
      <div class="icon-btn" onclick="toggleSettings()">⚙</div>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settings-panel">
    <div class="setting-row"><label>배경/포인트</label><input type="color" value="#615847" oninput="setVar('--point', this.value); setVar('--txt', this.value)" /></div>
    <div class="setting-row"><label>카드</label><input type="color" value="#FEF8FA" oninput="setVar('--point-soft', this.value)" /></div>
    <div class="setting-row"><label>완료</label><input type="color" value="#FDD5E7" oninput="setVar('--done-bg', this.value)" /></div>
    <div class="setting-row"><label>체크</label><input type="color" value="#FFF4B1" oninput="setVar('--check-bg', this.value)" /></div>
    <div class="setting-row"><label>초록</label><input type="color" value="#D3EBAD" oninput="setVar('--green-light', this.value)" /></div>
  </div>

  <!-- 캘린더 -->
  <div class="calendar-wrap">
    <div class="weekday-row">
      <div class="weekday">일</div><div class="weekday">월</div><div class="weekday">화</div>
      <div class="weekday">수</div><div class="weekday">목</div><div class="weekday">금</div>
      <div class="weekday">토</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
  </div>

  <!-- 선택 날짜 할일 -->
  <div id="selected-section" style="display:none">
    <div class="selected-date-label" id="selected-label"></div>
    <div id="task-list"></div>
  </div>

</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
  const realToday = new Date();
  let curYear  = realToday.getFullYear();
  let curMonth = realToday.getMonth();
  let selectedDate = null;
  let monthData = {};

  const DAYS = ['일','월','화','수','목','금','토'];
  const NOTION_COLORS = {
    default:'#c4a882', gray:'#b0b8c1', brown:'#c49a6c',
    orange:'#f0a070', yellow:'#e8c96a', green:'#82c882',
    blue:'#74aee8', purple:'#c49ad6', pink:'#f0a0b8', red:'#f08080',
  };
  function getTagColor(c) { return NOTION_COLORS[c] || NOTION_COLORS.default; }
  function pad(n) { return String(n).padStart(2, '0'); }
  function toDateStr(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
  function isToday(y, m, d) {
    return y === realToday.getFullYear() && m === realToday.getMonth() && d === realToday.getDate();
  }

  function setVar(prop, val) {
    document.documentElement.style.setProperty(prop, val);
    const saved = JSON.parse(localStorage.getItem('widget-colors-cal') || '{}');
    saved[prop] = val;
    localStorage.setItem('widget-colors-cal', JSON.stringify(saved));
  }
  function toggleSettings() { document.getElementById('settings-panel').classList.toggle('open'); }

  (function loadSavedColors() {
    const saved = JSON.parse(localStorage.getItem('widget-colors-cal') || '{}');
    Object.entries(saved).forEach(([prop, val]) => document.documentElement.style.setProperty(prop, val));
    document.querySelectorAll('input[type="color"]').forEach(input => {
      const prop = input.getAttribute('oninput')?.match(/'(--[^']+)'/)?.[1];
      if (prop && saved[prop]) input.value = saved[prop];
    });
  })();

  function moveMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    selectedDate = null;
    document.getElementById('selected-section').style.display = 'none';
    loadMonth();
  }

  async function loadMonth() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    const firstDay = `${curYear}-${pad(curMonth+1)}-01`;
    const lastDate = new Date(curYear, curMonth+1, 0).getDate();
    const lastDay  = `${curYear}-${pad(curMonth+1)}-${pad(lastDate)}`;
    updateHeader();
    try {
      const res = await fetch('/api/notion?action=query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          filter: { and: [
            { property: '날짜', date: { on_or_after: firstDay } },
            { property: '날짜', date: { on_or_before: lastDay } }
          ]},
          page_size: 100
        })
      });
      const data = await res.json();
      processData(data.results || []);
    } catch(e) { showToast('로드 실패'); }
    finally { btn.classList.remove('spinning'); }
  }

  function processData(items) {
    monthData = {};
    items.forEach(item => {
      const p    = item.properties;
      const date = p['날짜']?.date?.start?.split('T')[0];
      if (!date) return;
      if (!monthData[date]) monthData[date] = { total: 0, done: 0, items: [] };
      monthData[date].total++;
      if (p['완']?.checkbox) monthData[date].done++;
      monthData[date].items.push(item);
    });
    renderCalendar();
    if (selectedDate) renderTasks(selectedDate);
  }

  function updateHeader() {
    document.getElementById('month-label').textContent = `${curYear}년 ${curMonth+1}월`;
  }

  function renderCalendar() {
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';
    const firstDow = new Date(curYear, curMonth, 1).getDay();
    const lastDate = new Date(curYear, curMonth+1, 0).getDate();

    for (let i = 0; i < firstDow; i++) {
      const blank = document.createElement('div');
      blank.className = 'day-cell empty';
      grid.appendChild(blank);
    }

    for (let d = 1; d <= lastDate; d++) {
      const dateStr = toDateStr(curYear, curMonth, d);
      const dow     = new Date(curYear, curMonth, d).getDay();
      const info    = monthData[dateStr];
      const pct     = info ? Math.round((info.done / info.total) * 100) : 0;
      const allDone = info && info.done === info.total;

      const cell = document.createElement('div');
      cell.className = 'day-cell';
      if (isToday(curYear, curMonth, d)) cell.classList.add('today');
      if (dow === 0) cell.classList.add('sunday');
      if (dow === 6) cell.classList.add('saturday');
      if (selectedDate === dateStr) cell.classList.add('selected');

      cell.innerHTML = `
        <div class="day-num">${d}</div>
        ${info ? `<div class="day-indicator">
          <div class="day-count">${info.done}/${info.total}</div>
          <div class="day-bar-bg"><div class="day-bar-fill ${allDone ? 'done-all' : ''}" style="width:${pct}%"></div></div>
        </div>` : ''}`;

      cell.addEventListener('click', () => selectDate(dateStr));
      grid.appendChild(cell);
    }
  }

  function selectDate(dateStr) {
    selectedDate = dateStr;
    document.querySelectorAll('.day-cell.selected').forEach(el => el.classList.remove('selected'));
    const day = parseInt(dateStr.split('-')[2]);
    const cells = document.querySelectorAll('.day-cell:not(.empty)');
    if (cells[day - 1]) cells[day - 1].classList.add('selected');
    renderTasks(dateStr);
  }

  function renderTasks(dateStr) {
    const section = document.getElementById('selected-section');
    const label   = document.getElementById('selected-label');
    const list    = document.getElementById('task-list');
    const [y, m, d] = dateStr.split('-');
    const dow = new Date(dateStr).getDay();
    label.textContent = `${parseInt(m)}월 ${parseInt(d)}일 (${DAYS[dow]})`;
    section.style.display = 'block';

    const info = monthData[dateStr];
    if (!info || info.items.length === 0) {
      list.innerHTML = `<div class="empty-msg">등록된 할 일이 없어요 🌸</div>`;
      return;
    }


    const items = [...info.items].sort((a, b) => {
      const tA = a.properties?.['업무']?.multi_select?.[0]?.name || 'ㅿ';
      const tB = b.properties?.['업무']?.multi_select?.[0]?.name || 'ㅿ';
      return tA.localeCompare(tB, 'ko');
    });

    list.innerHTML = '';
    items.forEach((item, idx) => {
      const p       = item.properties;
      const content = p['업무 내용']?.title?.[0]?.plain_text || '(내용 없음)';
      const tags    = p['업무']?.multi_select || [];
      const done    = p['완']?.checkbox || false;
      const id      = item.id;

      const div = document.createElement('div');
      div.className = 'todo-item' + (done ? ' done' : '');
      div.style.animationDelay = (idx * 0.04) + 's';
      div.innerHTML = `
        <label class="cb-wrap">
          <input type="checkbox" ${done ? 'checked' : ''} onchange="updateTodo('${id}', this.checked, this, '${dateStr}')" />
          <div class="cb-box">
            <svg viewBox="0 0 13 11" fill="none">
              <path d="M1.5 5.5L5 9L11.5 2" stroke="#615847" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </label>
        <div class="todo-body">
          <div class="todo-row">
            ${tags.map(t => `<span class="tag" style="background:${getTagColor(t.color)}">${escapeHtml(t.name)}</span>`).join('')}
            <div class="todo-title">${escapeHtml(content)}</div>
          </div>
        </div>`;
      list.appendChild(div);
    });
  }

  async function updateTodo(pageId, checked, cbEl, dateStr) {
    const item = cbEl.closest('.todo-item');
    item.classList.toggle('done', checked);
    if (monthData[dateStr]) {
      monthData[dateStr].done += checked ? 1 : -1;
      renderCalendar();
      const day = parseInt(dateStr.split('-')[2]);
      const cells = document.querySelectorAll('.day-cell:not(.empty)');
      if (cells[day - 1]) cells[day - 1].classList.add('selected');
      const info = monthData[dateStr];
      const pct = Math.round((info.done / info.total) * 100);
      document.getElementById('progress-label').textContent = `${info.done} / ${info.total} 완료`;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    }
    try {
      const res = await fetch(`/api/notion?pageId=${pageId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ properties: { '완': { checkbox: checked } } })
      });
      if (!res.ok) { showToast('업데이트 실패'); cbEl.checked = !checked; item.classList.toggle('done', !checked); return; }
      showToast(checked ? '완료! ✨' : '다시 힘내요 🌸');
    } catch(e) { showToast('오류 발생'); }
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  updateHeader();
  loadMonth();
  setInterval(loadMonth, 5 * 60 * 1000);
</script>
</body>
</html>
