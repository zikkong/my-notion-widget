<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff'); font-weight:300; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff'); font-weight:400; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff'); font-weight:700; }

    :root {
      --border:#615847; --txt:#615847; --mute:#a08c78;
      --radius:18px; --font:'SBAggroOTF',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{display:none;}
    *{-ms-overflow-style:none;scrollbar-width:none;}

    body { font-family:var(--font); background:#fff; color:var(--txt); min-height:100vh; }
    body::before {
      content:''; position:fixed; top:0;left:0;right:0;bottom:0;
      border:2px solid var(--border); border-radius:var(--radius);
      pointer-events:none; z-index:9999;
    }

    /* 헤더 */
    .header {
      position:sticky; top:0; z-index:50; background:#fff;
      padding:16px 20px 10px;
      border-bottom:2px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .header-title { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
    .header-nav { display:flex; align-items:center; gap:8px; }
    .month-label { font-size:14px; font-weight:400; min-width:80px; text-align:center; }
    .nav-btn {
      background:#FEEAF1; border:1px solid #e8ddd5;
      border-radius:8px; width:26px; height:26px;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:13px; color:var(--txt);
    }
    .icon-btn {
      background:#FEEAF1; border:1px solid #e8ddd5;
      border-radius:8px; width:26px; height:26px;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:13px; color:var(--txt);
    }
    .icon-btn.spinning { animation:spin .6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    /* 범례 */
    .legend {
      display:flex; gap:8px; flex-wrap:wrap;
      padding:8px 20px;
      border-bottom:1px solid #f0e8e0;
    }
    .legend-item {
      display:flex; align-items:center; gap:4px;
      font-size:10px; font-weight:300; color:var(--mute);
    }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    /* 그리드 래퍼 */
    .grid-wrap {
      overflow-x:auto;
      padding:10px 20px 24px;
    }

    /* 그리드 테이블 */
    .grid-table {
      border-collapse:collapse;
      min-width:100%;
    }

    /* 날짜 헤더 행 */
    .date-header th {
      min-width:80px;
      padding:4px 6px;
      font-size:10px; font-weight:300; color:var(--mute);
      text-align:center;
      border-right:1px solid #f0e8e0;
      white-space:nowrap;
    }
    .date-header th:first-child {
      min-width:80px;
      position:sticky; left:0; z-index:5;
      background:#fff;
      border-right:2px solid #e8ddd5;
    }
    .date-header th.today-col {
      color:var(--border); font-weight:700;
      background:#FEF8FA;
    }
    .date-header th.weekend { color:#e07070; }

    /* 채널 행 */
    .channel-row td {
      border-right:1px solid #f0e8e0;
      border-bottom:1px solid #f0e8e0;
      padding:3px;
      vertical-align:top;
      min-height:40px;
    }
    .channel-row td:first-child {
      position:sticky; left:0; z-index:4;
      background:#fff;
      border-right:2px solid #e8ddd5;
      padding:6px 10px;
      font-size:11px; font-weight:700; color:var(--txt);
      white-space:nowrap;
      min-width:80px;
    }
    .channel-row td.today-col { background:#FEF8FA; }

    /* 프로젝트 블록 */
    .proj-block {
      border-radius:6px;
      padding:4px 6px;
      margin-bottom:2px;
      cursor:pointer;
      transition:opacity .15s;
      font-size:10px; font-weight:300;
      line-height:1.3;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:100%;
    }
    .proj-block:hover { opacity:0.8; }
    .proj-block.done { opacity:0.45; text-decoration:line-through; }

    /* 빈 상태 */
    .empty {
      text-align:center; padding:40px;
      font-size:13px; font-weight:300; color:var(--mute);
    }

    #toast {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--border); color:#fff;
      padding:8px 16px; border-radius:20px;
      font-size:12px; font-weight:300;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      pointer-events:none; z-index:9998;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 프로젝트 트래커</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="header-nav">
      <div class="nav-btn" onclick="moveMonth(-1)">‹</div>
      <div class="month-label" id="month-label">—</div>
      <div class="nav-btn" onclick="moveMonth(1)">›</div>
    </div>
    <div class="icon-btn" id="refresh-btn" onclick="load()">↻</div>
  </div>
</div>

<div class="legend" id="legend"></div>
<div id="main-content"><div class="empty">불러오는 중...</div></div>
<div id="toast"></div>

<script>
  const BG = {
    default:'#f0e8e0', gray:'#f0f1f3', brown:'#f5ede4',
    orange:'#fef0e8', yellow:'#fdf6d8', green:'#e8f5e8',
    blue:'#e4eef8', purple:'#f2ecff', pink:'#fdeef4', red:'#fdeee8'
  };
  const TXT = {
    default:'#7a5c3a', gray:'#5a6370', brown:'#7a5c3a',
    orange:'#a05030', yellow:'#7a6010', green:'#306830',
    blue:'#2060a0', purple:'#6040a0', pink:'#a03060', red:'#a03030'
  };

  const DAYS = ['일','월','화','수','목','금','토'];
  let schema = null;
  let stageOptions = [];
  let allProjects = [];
  let curYear = new Date().getFullYear();
  let curMonth = new Date().getMonth(); // 0-based

  function pad(n){ return String(n).padStart(2,'0'); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function moveMonth(dir){
    curMonth += dir;
    if(curMonth > 11){ curMonth=0; curYear++; }
    if(curMonth < 0){ curMonth=11; curYear--; }
    render();
  }

  async function load(){
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      if(!schema){
        const r = await fetch('/api/notion?action=project-schema');
        const d = await r.json();
        schema = d.properties;
        stageOptions = schema?.['단계']?.select?.options || [];
      }
      const r2 = await fetch('/api/notion?action=projects', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ page_size:100 })
      });
      const d2 = await r2.json();
      allProjects = d2.results || [];
      buildLegend();
      render();
    } catch(e) {
      document.getElementById('main-content').innerHTML = '<div class="empty">불러오기 실패 😢</div>';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function buildLegend(){
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    stageOptions.forEach(opt => {
      const color = opt.color || 'default';
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-dot" style="background:${TXT[color]||TXT.default}"></div>${esc(opt.name)}`;
      legend.appendChild(item);
    });
  }

  function render(){
    const today = new Date();
    const todayStr = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

    // 월 레이블
    document.getElementById('month-label').textContent = `${curYear}년 ${curMonth+1}월`;

    // 이번 달 날짜 목록
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const dates = [];
    for(let d=1; d<=daysInMonth; d++){
      const dateStr = `${curYear}-${pad(curMonth+1)}-${pad(d)}`;
      const dow = new Date(curYear, curMonth, d).getDay();
      dates.push({ d, dateStr, dow });
    }

    // 이번 달 프로젝트만 필터
    const monthProjects = allProjects.filter(p => {
      const dateStr = p.properties['업로드']?.date?.start?.split('T')[0] || null;
      if(!dateStr) return false;
      const [y, m] = dateStr.split('-').map(Number);
      return y === curYear && m === curMonth+1;
    });

    // 날짜없는 것도 포함
    const noDates = allProjects.filter(p => !p.properties['업로드']?.date?.start);

    // 채널 목록 (순서 유지)
    const channelSet = new Set();
    allProjects.forEach(p => {
      const ch = p.properties['채널']?.select?.name;
      if(ch) channelSet.add(ch);
    });
    const channels = [...channelSet];

    if(channels.length === 0){
      document.getElementById('main-content').innerHTML = '<div class="empty">프로젝트가 없어요 🌸</div>';
      return;
    }

    // 날짜-채널별 그룹핑
    const grid = {}; // grid[dateStr][channel] = [projects]
    monthProjects.forEach(p => {
      const dateStr = p.properties['업로드']?.date?.start?.split('T')[0];
      const ch = p.properties['채널']?.select?.name || '(미정)';
      if(!grid[dateStr]) grid[dateStr] = {};
      if(!grid[dateStr][ch]) grid[dateStr][ch] = [];
      grid[dateStr][ch].push(p);
    });

    // 테이블 생성
    const table = document.createElement('table');
    table.className = 'grid-table';

    // 날짜 헤더 행
    const thead = document.createElement('thead');
    const headerRow = document.createElement('tr');
    headerRow.className = 'date-header';
    const thEmpty = document.createElement('th');
    thEmpty.textContent = '채널';
    headerRow.appendChild(thEmpty);

    dates.forEach(({ d, dateStr, dow }) => {
      const th = document.createElement('th');
      th.textContent = `${d}\n${DAYS[dow]}`;
      th.style.whiteSpace = 'pre';
      th.style.lineHeight = '1.4';
      if(dateStr === todayStr) th.classList.add('today-col');
      if(dow === 0 || dow === 6) th.classList.add('weekend');
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // 채널 행
    const tbody = document.createElement('tbody');
    channels.forEach(channel => {
      const tr = document.createElement('tr');
      tr.className = 'channel-row';

      const tdName = document.createElement('td');
      tdName.textContent = channel;
      tr.appendChild(tdName);

      dates.forEach(({ dateStr, dow }) => {
        const td = document.createElement('td');
        if(dateStr === todayStr) td.classList.add('today-col');

        const items = grid[dateStr]?.[channel] || [];
        items.forEach(p => {
          const props = p.properties;
          const title = props['진행 중']?.title?.[0]?.plain_text || '(제목 없음)';
          const stage = props['단계']?.select;
          const done  = props['완']?.checkbox || false;
          const color = stage?.color || 'default';

          const block = document.createElement('div');
          block.className = 'proj-block' + (done?' done':'');
          block.style.background = BG[color] || BG.default;
          block.style.color = TXT[color] || TXT.default;
          block.title = title;
          block.textContent = title;
          block.addEventListener('click', () => {
            window.open(`https://notion.so/${p.id.replace(/-/g,'')}`, '_blank');
          });
          td.appendChild(block);
        });

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    const wrap = document.createElement('div');
    wrap.className = 'grid-wrap';
    wrap.appendChild(table);

    const content = document.getElementById('main-content');
    content.innerHTML = '';
    content.appendChild(wrap);

    // 오늘로 스크롤
    setTimeout(() => {
      const todayTh = document.querySelector('.today-col');
      if(todayTh) todayTh.scrollIntoView({ inline:'center', behavior:'smooth' });
    }, 100);
  }

  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  load();
  setInterval(load, 5*60*1000);
</script>
</body>
</html>
