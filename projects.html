<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff'); font-weight:300; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff'); font-weight:400; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff'); font-weight:700; }

    :root {
      --border:#615847; --txt:#615847; --mute:#a08c78;
      --radius:18px; --font:'SBAggroOTF',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{display:none;}
    *{-ms-overflow-style:none;scrollbar-width:none;}

    body { font-family:var(--font); background:#fff; color:var(--txt); min-height:100vh; }
    body::before {
      content:''; position:fixed; top:0;left:0;right:0;bottom:0;
      border:2px solid var(--border); border-radius:var(--radius);
      pointer-events:none; z-index:9999;
    }

    .header {
      position:sticky; top:0; z-index:50; background:#fff;
      padding:16px 20px 10px;
      border-bottom:2px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .header-title { font-size:18px; font-weight:700; letter-spacing:-0.5px; }
    .header-right { display:flex; gap:8px; align-items:center; }
    .header-nav { display:flex; align-items:center; gap:6px; }
    .month-label { font-size:13px; font-weight:400; min-width:76px; text-align:center; }
    .nav-btn, .icon-btn {
      background:#FEEAF1; border:1px solid #e8ddd5;
      border-radius:8px; width:26px; height:26px;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:13px; color:var(--txt);
      flex-shrink:0;
    }
    .icon-btn.spinning { animation:spin .6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg);} }

    .legend {
      display:flex; gap:8px; flex-wrap:wrap;
      padding:8px 20px; border-bottom:1px solid #f0e8e0;
    }
    .legend-item {
      display:flex; align-items:center; gap:4px;
      font-size:10px; font-weight:300; color:var(--mute);
    }
    .legend-dot { width:8px; height:8px; border-radius:50%; }

    /* 그리드 */
    .grid-wrap {
      overflow-x:auto;
      overflow-y:auto;
      padding:10px 0 24px;
      cursor:grab;
      user-select:none;
    }
    .grid-wrap.grabbing { cursor:grabbing; }

    .grid-table {
      border-collapse:collapse;
      table-layout:fixed;
    }

    .date-header th {
      width:90px; min-width:90px;
      padding:4px 6px;
      font-size:10px; font-weight:300; color:var(--mute);
      text-align:center;
      border-right:1px solid #f0e8e0;
      border-bottom:1px solid #e8ddd5;
      white-space:pre;
      line-height:1.4;
      position:sticky; top:0; z-index:3; background:#fff;
    }
    .date-header th:first-child {
      width:80px; min-width:80px;
      position:sticky; left:0; top:0; z-index:6;
      background:#fff;
      border-right:2px solid #e8ddd5;
    }
    .date-header th.today-col { color:var(--border); font-weight:700; background:#FEF8FA; }
    .date-header th.weekend { color:#e07070; }

    .channel-row td {
      border-right:1px solid #f0e8e0;
      border-bottom:1px solid #f0e8e0;
      padding:3px;
      vertical-align:top;
      min-height:44px;
      width:90px;
    }
    .channel-row td:first-child {
      position:sticky; left:0; z-index:4;
      background:#fff;
      border-right:2px solid #e8ddd5;
      padding:6px 10px;
      font-size:11px; font-weight:700; color:var(--txt);
      white-space:nowrap;
      width:80px;
    }
    .channel-row td.today-col { background:#FEF8FA; }

    .proj-block {
      border-radius:6px;
      padding:4px 6px;
      margin-bottom:2px;
      cursor:pointer;
      font-size:10px; font-weight:300;
      line-height:1.3;
      overflow:hidden;
    }
    .proj-block:hover { filter:brightness(0.95); }
    .proj-block.done { opacity:0.4; text-decoration:line-through; }
    .block-title { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .block-upload { font-size:8px; opacity:0.7; margin-top:1px; }

    /* 수정 모달 */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.2);
      z-index:200; display:none; align-items:center; justify-content:center;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:#fff; border:2px solid var(--border);
      border-radius:var(--radius); padding:20px; width:280px;
      box-shadow:0 8px 24px rgba(0,0,0,0.12);
    }
    .modal-title { font-size:13px; font-weight:700; color:var(--txt); margin-bottom:14px; }
    .modal-label { font-size:10px; font-weight:300; color:var(--mute); margin-bottom:6px; }
    .stage-options { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
    .stage-opt {
      padding:4px 10px; border-radius:20px;
      font-size:11px; font-weight:300;
      cursor:pointer; border:1.5px solid transparent;
      transition:opacity .15s;
    }
    .stage-opt.selected { border-color: var(--border); }
    .done-row {
      display:flex; align-items:center; gap:8px;
      margin-bottom:14px; font-size:12px; font-weight:300;
    }
    .done-row input { cursor:pointer; width:16px; height:16px; }
    .modal-btns { display:flex; gap:8px; justify-content:flex-end; }
    .modal-btns button {
      border:none; border-radius:8px; padding:7px 14px;
      font-size:12px; font-family:var(--font); cursor:pointer;
    }
    .btn-cancel { background:#f0e8e0; color:var(--txt); }
    .btn-save   { background:var(--border); color:#fff; font-weight:400; }

    .empty { text-align:center; padding:40px; font-size:13px; font-weight:300; color:var(--mute); }

    #toast {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--border); color:#fff;
      padding:8px 16px; border-radius:20px;
      font-size:12px; font-weight:300;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      pointer-events:none; z-index:9998;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 프로젝트 트래커</div>
  <div class="header-right">
    <div class="header-nav">
      <div class="nav-btn" onclick="moveMonth(-1)">‹</div>
      <div class="month-label" id="month-label">—</div>
      <div class="nav-btn" onclick="moveMonth(1)">›</div>
    </div>
    <div class="icon-btn" id="refresh-btn" onclick="load()">↻</div>
  </div>
</div>

<div class="legend" id="legend"></div>
<div id="main-content"><div class="empty">불러오는 중...</div></div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-project-title">—</div>
    <div class="modal-label">단계</div>
    <div class="stage-options" id="stage-options"></div>
    <div class="done-row">
      <input type="checkbox" id="done-check" />
      <label for="done-check">완료</label>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const BG  = { default:'#f0e8e0',gray:'#f0f1f3',brown:'#f5ede4',orange:'#fef0e8',yellow:'#fdf6d8',green:'#e8f5e8',blue:'#e4eef8',purple:'#f2ecff',pink:'#fdeef4',red:'#fdeee8' };
  const TXT = { default:'#7a5c3a',gray:'#5a6370',brown:'#7a5c3a',orange:'#a05030',yellow:'#7a6010',green:'#306830',blue:'#2060a0',purple:'#6040a0',pink:'#a03060',red:'#a03030' };
  const DAYS = ['일','월','화','수','목','금','토'];

  let schema=null, stageOptions=[], allProjects=[];
  let curYear=new Date().getFullYear(), curMonth=new Date().getMonth();
  let editingPageId=null, selectedStage=null;

  function pad(n){ return String(n).padStart(2,'0'); }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function moveMonth(dir){
    curMonth+=dir;
    if(curMonth>11){curMonth=0;curYear++;}
    if(curMonth<0){curMonth=11;curYear--;}
    render();
  }

  async function load(){
    const btn=document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      if(!schema){
        const r=await fetch('/api/notion?action=project-schema');
        const d=await r.json();
        schema=d.properties;
        stageOptions=schema?.['단계']?.select?.options||[];
      }
      const r2=await fetch('/api/notion?action=projects',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({page_size:100})
      });
      const d2=await r2.json();
      allProjects=d2.results||[];
      buildLegend(); render();
    } catch(e){
      document.getElementById('main-content').innerHTML='<div class="empty">불러오기 실패 😢</div>';
    } finally { btn.classList.remove('spinning'); }
  }

  function buildLegend(){
    const legend=document.getElementById('legend');
    legend.innerHTML='';
    stageOptions.forEach(opt=>{
      const c=opt.color||'default';
      const item=document.createElement('div');
      item.className='legend-item';
      item.innerHTML=`<div class="legend-dot" style="background:${TXT[c]||TXT.default}"></div>${esc(opt.name)}`;
      legend.appendChild(item);
    });
  }

  function render(){
    const today=new Date();
    const todayStr=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;
    document.getElementById('month-label').textContent=`${curYear}년 ${curMonth+1}월`;

    const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
    const dates=[];
    for(let d=1;d<=daysInMonth;d++){
      const dateStr=`${curYear}-${pad(curMonth+1)}-${pad(d)}`;
      const dow=new Date(curYear,curMonth,d).getDay();
      dates.push({d,dateStr,dow});
    }

    // 일자 기준으로 이번 달 프로젝트 필터
    const monthProjects=allProjects.filter(p=>{
      const dateStr=p.properties['일자']?.date?.start?.split('T')[0]||null;
      if(!dateStr) return false;
      const [y,m]=dateStr.split('-').map(Number);
      return y===curYear && m===curMonth+1;
    });

    // 채널 목록
    const channelSet=new Set();
    allProjects.forEach(p=>{
      const ch=p.properties['채널']?.select?.name;
      if(ch) channelSet.add(ch);
    });
    const channels=[...channelSet];

    if(channels.length===0){
      document.getElementById('main-content').innerHTML='<div class="empty">프로젝트가 없어요 🌸</div>';
      return;
    }

    // 날짜-채널별 그룹핑
    const grid={};
    monthProjects.forEach(p=>{
      const dateStr=p.properties['일자']?.date?.start?.split('T')[0];
      const ch=p.properties['채널']?.select?.name||'(미정)';
      if(!grid[dateStr]) grid[dateStr]={};
      if(!grid[dateStr][ch]) grid[dateStr][ch]=[];
      grid[dateStr][ch].push(p);
    });

    const table=document.createElement('table');
    table.className='grid-table';

    // 헤더
    const thead=document.createElement('thead');
    const headerRow=document.createElement('tr');
    headerRow.className='date-header';
    const thEmpty=document.createElement('th');
    thEmpty.textContent='채널';
    headerRow.appendChild(thEmpty);
    dates.forEach(({d,dateStr,dow})=>{
      const th=document.createElement('th');
      th.textContent=`${d}\n${DAYS[dow]}`;
      if(dateStr===todayStr) th.classList.add('today-col');
      if(dow===0||dow===6) th.classList.add('weekend');
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // 채널 행
    const tbody=document.createElement('tbody');
    channels.forEach(channel=>{
      const tr=document.createElement('tr');
      tr.className='channel-row';
      const tdName=document.createElement('td');
      tdName.textContent=channel;
      tr.appendChild(tdName);

      dates.forEach(({dateStr,dow})=>{
        const td=document.createElement('td');
        if(dateStr===todayStr) td.classList.add('today-col');

        const items=grid[dateStr]?.[channel]||[];
        items.forEach(p=>{
          const props=p.properties;
          const title=props['진행 중']?.title?.[0]?.plain_text||'(제목 없음)';
          const stage=props['단계']?.select;
          const upload=props['업로드']?.date?.start?.split('T')[0]||null;
          const done=props['완']?.checkbox||false;
          const color=stage?.color||'default';

          const block=document.createElement('div');
          block.className='proj-block'+(done?' done':'');
          block.style.background=BG[color]||BG.default;
          block.style.color=TXT[color]||TXT.default;

          const uploadLabel=upload?`업로드 ${upload.slice(5).replace('-','/')}`:'' ;
          block.innerHTML=`
            <div class="block-title">${esc(title)}</div>
            ${upload?`<div class="block-upload">📅 ${uploadLabel}</div>`:''}`;

          block.addEventListener('click', e=>{
            e.stopPropagation();
            openModal(p);
          });
          td.appendChild(block);
        });
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    const wrap=document.createElement('div');
    wrap.className='grid-wrap';
    wrap.style.padding='10px 20px 24px';
    wrap.appendChild(table);

    // 드래그 스크롤
    let isDown=false, startX, startY, scrollLeft, scrollTop;
    wrap.addEventListener('mousedown', e=>{
      if(e.target.closest('.proj-block')) return;
      isDown=true; wrap.classList.add('grabbing');
      startX=e.pageX-wrap.offsetLeft; startY=e.pageY-wrap.offsetTop;
      scrollLeft=wrap.scrollLeft; scrollTop=wrap.scrollTop;
    });
    wrap.addEventListener('mouseleave',()=>{ isDown=false; wrap.classList.remove('grabbing'); });
    wrap.addEventListener('mouseup',()=>{ isDown=false; wrap.classList.remove('grabbing'); });
    wrap.addEventListener('mousemove', e=>{
      if(!isDown) return; e.preventDefault();
      const x=e.pageX-wrap.offsetLeft, y=e.pageY-wrap.offsetTop;
      wrap.scrollLeft=scrollLeft-(x-startX);
      wrap.scrollTop=scrollTop-(y-startY);
    });

    const content=document.getElementById('main-content');
    content.innerHTML='';
    content.appendChild(wrap);

    // 오늘로 스크롤
    setTimeout(()=>{
      const todayTh=wrap.querySelector('.today-col');
      if(todayTh) wrap.scrollLeft=todayTh.offsetLeft-100;
    },100);
  }

  // 모달
  function openModal(p){
    editingPageId=p.id;
    const props=p.properties;
    const title=props['진행 중']?.title?.[0]?.plain_text||'(제목 없음)';
    const currentStage=props['단계']?.select?.name||null;
    const done=props['완']?.checkbox||false;

    document.getElementById('modal-project-title').textContent=title;
    document.getElementById('done-check').checked=done;

    // 단계 옵션
    const stageEl=document.getElementById('stage-options');
    stageEl.innerHTML='';
    selectedStage=currentStage;
    stageOptions.forEach(opt=>{
      const c=opt.color||'default';
      const btn=document.createElement('div');
      btn.className='stage-opt'+(opt.name===currentStage?' selected':'');
      btn.style.background=BG[c]||BG.default;
      btn.style.color=TXT[c]||TXT.default;
      btn.textContent=opt.name;
      btn.addEventListener('click',()=>{
        selectedStage=opt.name;
        stageEl.querySelectorAll('.stage-opt').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
      });
      stageEl.appendChild(btn);
    });

    document.getElementById('modal').classList.add('open');
  }

  function closeModal(){
    document.getElementById('modal').classList.remove('open');
    editingPageId=null; selectedStage=null;
  }

  async function saveModal(){
    if(!editingPageId) return;
    const done=document.getElementById('done-check').checked;
    const body={ properties:{ '완':{ checkbox:done } } };
    if(selectedStage){
      body.properties['단계']={ select:{ name:selectedStage } };
    }
    try {
      const res=await fetch(`/api/notion?action=update-project&pageId=${editingPageId}`,{
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!res.ok) throw new Error();
      closeModal();
      showToast('저장됐어요! ✓');
      await load();
    } catch(e){ showToast('저장 실패 😢'); }
  }

  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  document.getElementById('modal').addEventListener('click',e=>{
    if(e.target===document.getElementById('modal')) closeModal();
  });

  load();
  setInterval(load,5*60*1000);
</script>
</body>
</html>
