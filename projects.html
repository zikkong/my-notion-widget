<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <style>
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroL.woff') format('woff'); font-weight:300; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroM.woff') format('woff'); font-weight:400; }
    @font-face { font-family:'SBAggroOTF'; src:url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/SBAggroB.woff') format('woff'); font-weight:700; }

    :root {
      --border:#615847; --txt:#615847; --mute:#a08c78;
      --radius:18px; --font:'SBAggroOTF',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    ::-webkit-scrollbar{display:none;}
    *{-ms-overflow-style:none;scrollbar-width:none;}

    body {
      font-family:var(--font); background:#fff; color:var(--txt); min-height:100vh;
    }
    body::before {
      content:''; position:fixed; top:0;left:0;right:0;bottom:0;
      border:2px solid var(--border); border-radius:var(--radius);
      pointer-events:none; z-index:9999;
    }

    /* 헤더 */
    .header {
      position:sticky; top:0; z-index:50; background:#fff;
      padding:18px 20px 12px;
      border-bottom:2px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .header-title { font-size:20px; font-weight:700; letter-spacing:-0.5px; }
    .icon-btn {
      background:#FEEAF1; border:1px solid #e8ddd5;
      border-radius:8px; width:28px; height:28px;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; font-size:13px; color:var(--txt);
    }
    .icon-btn.spinning { animation:spin .6s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 범례 */
    .legend {
      display:flex; gap:8px; flex-wrap:wrap;
      padding:10px 20px;
      border-bottom:1px solid #f0e8e0;
    }
    .legend-item {
      display:flex; align-items:center; gap:4px;
      font-size:10px; font-weight:300; color:var(--mute);
    }
    .legend-dot {
      width:8px; height:8px; border-radius:50%;
    }

    /* 메인 테이블 */
    .tracker {
      padding:12px 20px 24px;
      overflow-x:auto;
    }

    .channel-row {
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
      min-height:52px;
    }

    .channel-name {
      width:80px;
      flex-shrink:0;
      font-size:12px;
      font-weight:700;
      color:var(--txt);
      padding-top:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .channel-blocks {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      flex:1;
    }

    /* 프로젝트 블록 */
    .proj-block {
      border-radius:10px;
      padding:8px 12px;
      cursor:pointer;
      transition:opacity .15s, box-shadow .15s;
      min-width:110px;
      max-width:160px;
      position:relative;
    }
    .proj-block:hover { opacity:0.85; box-shadow:0 2px 8px rgba(0,0,0,0.1); }

    .block-title {
      font-size:12px; font-weight:400;
      line-height:1.3; margin-bottom:4px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .block-date {
      font-size:9px; font-weight:300;
      opacity:0.75;
    }
    .block-date.near { font-weight:700; opacity:1; }

    .block-check {
      position:absolute;
      top:5px; right:6px;
      width:14px; height:14px;
      border-radius:50%;
      background:rgba(255,255,255,0.4);
      display:flex; align-items:center; justify-content:center;
      font-size:8px;
    }

    /* 빈 상태 */
    .empty {
      text-align:center; padding:40px;
      font-size:13px; font-weight:300; color:var(--mute);
    }

    /* 토스트 */
    #toast {
      position:fixed; bottom:20px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--border); color:#fff;
      padding:8px 16px; border-radius:20px;
      font-size:12px; font-weight:300;
      transition:transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
      pointer-events:none; z-index:9998;
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <div class="header-title">📋 프로젝트 트래커</div>
  <div class="icon-btn" id="refresh-btn" onclick="load()">↻</div>
</div>

<div class="legend" id="legend"></div>
<div id="main-content"><div class="empty">불러오는 중...</div></div>
<div id="toast"></div>

<script>
  // 노션 색상 → 배경/텍스트
  const BG = {
    default:'#f0e8e0', gray:'#f0f1f3', brown:'#f5ede4',
    orange:'#fef0e8', yellow:'#fdf6d8', green:'#e8f5e8',
    blue:'#e4eef8', purple:'#f2ecff', pink:'#fdeef4', red:'#fdeee8'
  };
  const TXT = {
    default:'#7a5c3a', gray:'#5a6370', brown:'#7a5c3a',
    orange:'#a05030', yellow:'#7a6010', green:'#306830',
    blue:'#2060a0', purple:'#6040a0', pink:'#a03060', red:'#a03030'
  };

  let schema = null;
  let stageOptions = []; // 순서 있는 단계 옵션

  function formatDate(str){
    if(!str) return null;
    const d = new Date(str);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.floor((d-today)/(86400000));
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    if(diff<0)  return { str:label+' (지남)', near:true };
    if(diff===0) return { str:'오늘', near:true };
    if(diff<=3)  return { str:label+` D-${diff}`, near:true };
    return { str:label, near:false };
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  async function load(){
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    try {
      // 스키마 (단계 색상/순서)
      if(!schema){
        const r = await fetch('/api/notion?action=project-schema');
        const d = await r.json();
        schema = d.properties;
        stageOptions = schema?.['단계']?.select?.options || [];
      }

      // 프로젝트 목록
      const r2 = await fetch('/api/notion?action=projects', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ page_size:100, sorts:[{property:'업로드', direction:'ascending'}] })
      });
      const d2 = await r2.json();
      const projects = d2.results || [];

      buildLegend();
      render(projects);
    } catch(e) {
      document.getElementById('main-content').innerHTML = '<div class="empty">불러오기 실패 😢</div>';
    } finally {
      btn.classList.remove('spinning');
    }
  }

  function buildLegend(){
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    stageOptions.forEach(opt => {
      const color = opt.color || 'default';
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-dot" style="background:${TXT[color]||TXT.default}"></div>${esc(opt.name)}`;
      legend.appendChild(item);
    });
  }

  function render(projects){
    const content = document.getElementById('main-content');

    if(projects.length === 0){
      content.innerHTML = '<div class="empty">진행 중인 프로젝트가 없어요 🌸</div>';
      return;
    }

    // 채널별 그룹핑
    const channelMap = {};
    projects.forEach(p => {
      const ch = p.properties['채널명']?.select?.name || '(채널 미정)';
      if(!channelMap[ch]) channelMap[ch] = [];
      channelMap[ch].push(p);
    });

    const tracker = document.createElement('div');
    tracker.className = 'tracker';

    Object.entries(channelMap).forEach(([channel, items]) => {
      const row = document.createElement('div');
      row.className = 'channel-row';

      const nameEl = document.createElement('div');
      nameEl.className = 'channel-name';
      nameEl.textContent = channel;
      row.appendChild(nameEl);

      const blocks = document.createElement('div');
      blocks.className = 'channel-blocks';

      // 날짜순 정렬
      items.sort((a,b) => {
        const da = a.properties['업로드 예정일']?.date?.start || '9999';
        const db = b.properties['업로드 예정일']?.date?.start || '9999';
        return da.localeCompare(db);
      });

      items.forEach(p => {
        const props = p.properties;
        const title   = props['진행 중']?.title?.[0]?.plain_text || '(제목 없음)';
        const stage   = props['단계']?.select;
        const dateStr = props['업로드']?.date?.start || null;
        const done    = props['완']?.checkbox || false;
        const dateInfo = dateStr ? formatDate(dateStr) : null;

        const color = stage?.color || 'default';
        const bg  = BG[color]  || BG.default;
        const txt = TXT[color] || TXT.default;

        const block = document.createElement('div');
        block.className = 'proj-block';
        block.style.background = bg;
        block.style.color = txt;
        if(done) block.style.opacity = '0.5';

        block.innerHTML = `
          <div class="block-check" style="color:${txt}">${done?'✓':''}</div>
          <div class="block-title">${esc(title)}</div>
          ${dateInfo ? `<div class="block-date ${dateInfo.near?'near':''}">${dateInfo.str}</div>` : ''}`;

        block.addEventListener('click', () => {
          window.open(`https://notion.so/${p.id.replace(/-/g,'')}`, '_blank');
        });

        blocks.appendChild(block);
      });

      row.appendChild(blocks);
      tracker.appendChild(row);
    });

    content.innerHTML = '';
    content.appendChild(tracker);
  }

  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  load();
  setInterval(load, 5*60*1000);
</script>
</body>
</html>
